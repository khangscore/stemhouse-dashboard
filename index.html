<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Custom Edition</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">

  <!-- Restore favicon (emoji) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%238b5cf6'/%3E%3Ctext x='50' y='64' font-size='44' text-anchor='middle' fill='white'%3E%F0%9F%A4%AA%3C/text%3E%3C/svg%3E">

  <style>
    /* ===================== THEME & ROOT ===================== */
    :root {
      --bg-color: #0f0720;
      --card-bg: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.2);
      --text-main: #ffffff;
      --accent: #8b5cf6;          /* MÀU CHỦ ĐẠO mới (tím sáng hơn) */
      --accent-dark: #6d28d9;
      --liam-blue: #3b82f6;
      --sidebar-width: 260px;
      --sidebar-collapsed-width: 80px;
      --shadow-accent: 0 0 24px rgba(139,92,246,0.32);
    }

    body.light-mode {
      --bg-color: #f8fafc;
      --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.1);
      --text-main: #1e293b;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:"Segoe UI","Noto Color Emoji",sans-serif; }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      min-height:100vh;
      overflow-x:hidden;
      background-image: radial-gradient(circle at 50% -20%, color-mix(in srgb, var(--accent) 45%, #4c1d95), #1e1045 55%, var(--bg-color));
    }

    /* Animated background layer */
    body::before{
      content:'';
      position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(600px 400px at 10% 20%, rgba(139,92,246,0.12), transparent 12%),
        radial-gradient(500px 300px at 85% 80%, rgba(59,130,246,0.06), transparent 12%),
        radial-gradient(380px 250px at 50% -10%, rgba(139,92,246,0.14), transparent 10%);
      filter: blur(28px) saturate(1.05);
      animation: bgMove 16s linear infinite alternate;
      pointer-events:none;
    }
    @keyframes bgMove{ 0%{transform:translate3d(0,0,0) scale(1); opacity:.95}50%{transform:translate3d(-6%,4%,0) scale(1.02);opacity:1}100%{transform:translate3d(6%,-4%,0) scale(1);opacity:.96} }

    /* ======= Card and controls baseline ======= */
    .card{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:18px; padding:16px; }

    /* ========================= SIDEBAR: hover-to-expand + thick frame --------------- */
    .toggle-sidebar { display: none !important; }

    .sidebar {
      position: fixed; top:20px; left:10px; bottom:20px;
      width: var(--sidebar-collapsed-width);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      backdrop-filter: blur(18px);
      border: 6px solid rgba(255,255,255,0.03);
      border-radius: 20px;
      z-index:2000; display:flex; flex-direction:column; transition: width .32s cubic-bezier(.2,1,.36,1), box-shadow .28s, border-color .28s; overflow:visible; padding-bottom:12px;
    }

    .sidebar:not(:hover){ box-shadow: 0 6px 30px rgba(0,0,0,0.35), 0 0 0 6px color-mix(in srgb, var(--accent) 18%, transparent); border-color: color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,0.02)); }
    .sidebar:hover { width: var(--sidebar-width); border-color: var(--accent); box-shadow: 0 12px 40px rgba(13,8,30,0.6), 0 0 0 8px color-mix(in srgb, var(--accent) 18%, transparent); }

    .sidebar-header{ padding:12px; height:86px; display:flex; align-items:center; gap:12px; justify-content:center; }

    .sidebar-avatar{ width:45px; height:45px; border-radius:50%; border:2px solid var(--accent); background:#fff; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:1.4rem; transition: transform .28s cubic-bezier(.2,1,.36,1), box-shadow .28s; transform-origin:center; }
    .sidebar:hover .sidebar-avatar { transform: scale(1.9); box-shadow: 0 8px 30px rgba(0,0,0,0.35), 0 0 30px color-mix(in srgb, var(--accent) 22%, transparent); }

    .sidebar-username{ margin-left:8px; font-weight:800; color:var(--accent); opacity:0; transform:translateX(-6px); transition: opacity .22s ease, transform .28s; white-space:nowrap; display:inline-block; }
    .sidebar:hover .sidebar-username{ opacity:1; transform:translateX(0); }

    .nav-content{ flex:1; margin-top:8px; padding:8px 10px 18px; display:flex; flex-direction:column; gap:8px; }

    .nav-item{ min-height:56px; height:56px; display:flex; align-items:center; gap:12px; border-radius:14px; cursor:pointer; padding:0 14px; transition: transform .22s cubic-bezier(.2,1,.36,1), box-shadow .28s, background .18s, border-color .18s; }
    .nav-item > .nav-icon{ width:28px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }

    .sidebar:not(:hover) .nav-item{ justify-content:center; padding:0; }
    .sidebar:not(:hover) .nav-icon{ margin-left:12px; }

    .nav-item:hover{ transform: translateY(-12px) scale(1.03); box-shadow: 0 18px 50px rgba(11,8,30,0.6), 0 0 32px color-mix(in srgb, var(--accent) 22%, transparent); background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,0.02)), rgba(255,255,255,0.02)); border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.06)); color:#fff; }

    .nav-text{ flex:1; opacity:0; visibility:hidden; transform:translateX(-6px); transition: all .28s; }
    .sidebar:hover .nav-text{ opacity:1; visibility:visible; transform:translateX(0); }

    .nav-item.active{ background:var(--accent); color:#000; box-shadow: var(--shadow-accent); transform: translateY(-6px); }

    .sidebar-footer{ margin-top:auto; padding:12px; display:flex; align-items:center; justify-content:center; }
    .logout-btn{ width:calc(100% - 24px); border-radius:14px; padding:10px 12px; background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 78%, #fff), var(--accent)); color:#000; font-weight:800; cursor:pointer; border:none; box-shadow:0 8px 28px rgba(0,0,0,0.35); transition: transform .12s ease; }
    .logout-btn:active{ transform: translateY(1px) scale(.995); }

    /* theme switch & picker */
    .theme-switch{ position:fixed; bottom:30px; right:30px; width:56px; height:56px; border-radius:50%; background:var(--accent); color:#000; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:3000; font-size:1.6rem; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
    #bgPickerBtn{ position:fixed; bottom:30px; right:100px; width:44px; height:44px; border-radius:10px; background:rgba(255,255,255,0.02); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 6px 18px rgba(0,0,0,0.35); }

    /* modal styles */
    .modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:10002; padding:20px; }
    .modal-box{ background:linear-gradient(180deg,#1f232c,#171a22); width:100%; max-width:520px; border-radius:18px; padding:22px; color:#e8eaed; border:1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 60px rgba(0,0,0,0.35); }
    .modal-title{ text-align:left; font-size:1.6rem; font-weight:800; margin-bottom:12px; }
    .modal-actions{ display:flex; justify-content:center; gap:12px; margin-top:10px; }
    .modal-actions button{ min-width:140px; padding:12px 18px; border-radius:12px; font-weight:800; border:none; cursor:pointer; }
    .btn-confirm{ background:#ff4747; color:#fff; }
    .btn-cancel{ background:#3c4043; color:#fff; }

    /* calendar scaffold */
    .calendar-layout{ max-width:1120px; margin:0 auto; min-height:420px; display:grid; grid-template-columns:1fr; gap:16px; }
    .calendar-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
    .calendar-cell{ min-height:110px; border-radius:12px; background:rgba(255,255,255,0.03); padding:8px; display:flex; flex-direction:column; }
    .calendar-cell.weekday{ min-height:44px; font-weight:800; background:rgba(255,255,255,0.08); }
    .integrated-note{ min-height:54px; width:100%; border-radius:8px; padding:6px; background:transparent; color:inherit; border:1px solid rgba(255,255,255,0.04); }

    /* Excel scaffold */
    .excel-wrap{ width:100%; display:flex; flex-direction:column; gap:12px; }
    .excel-toolbar{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .excel-cell{ min-width:96px; min-height:32px; border:1px solid rgba(255,255,255,0.04); padding:6px; background:transparent; }
    .excel-cell[contenteditable]:focus{ outline:2px solid color-mix(in srgb, var(--accent) 60%, transparent); }

    /* highlight when clicked */
    .excel-cell.highlighted{ box-shadow: 0 0 0 3px var(--accent) !important; border-color:var(--accent) !important; }

    /* MAIN container spacing: JS-driven (robust) */
    main.container{ max-width:1200px; margin:0 auto; padding-top:60px; padding-bottom:100px; padding-left: calc(var(--sidebar-collapsed-width) + 48px); transition: padding-left .28s ease; position:relative; }
    /* use body class toggled by JS to shift main reliably */
    body.sidebar-open .container{ padding-left: calc(var(--sidebar-width) + 64px); }

    @media(max-width:900px){ .sidebar{ left:6px; } .calendar-cell{ min-height:100px; } }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-avatar" id="login-icon">🤪</div>
      <div class="sidebar-username">Khang</div>
    </div>

    <nav class="nav-content">
      <div class="nav-item active" data-page="home">
        <div class="nav-icon">🏠</div>
        <div class="nav-text">Home</div>
      </div>
      <div class="nav-item" data-page="dashboard">
        <div class="nav-icon">📊</div>
        <div class="nav-text">Dashboard</div>
      </div>
      <div class="nav-item" data-page="excel">
        <div class="nav-icon">📄</div>
        <div class="nav-text">Excel trắng</div>
      </div>
      <div class="nav-item" data-page="settings">
        <div class="nav-icon">⚙️</div>
        <div class="nav-text">Cài đặt</div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" id="logoutBtn">Đăng xuất</button>
    </div>
  </aside>

  <!-- THEME & BACKGROUND PICKER -->
  <button id="bgPickerBtn" title="Thay nền">✏️</button>
  <button class="theme-switch" id="themeSwitch" title="Đổi ngày/đêm">🌗</button>

  <!-- MAIN CONTAINER -->
  <main class="container">
    <header class="header-group">
      <h1>AO Dashboard Q10</h1>
      <div class="home-date">Chào mừng bạn!</div>
    </header>

    <!-- HOME PAGE CONTENT -->
    <section id="home" class="page-content active-page">
      <div class="calendar-layout card" style="padding:16px;">
        <div id="vietnamCalendar"></div>
      </div>
    </section>

    <!-- EXCEL PAGE -->
    <section id="excel" class="page-content">
      <div class="excel-wrap card" id="excelApp" style="padding:12px;">
        <div class="excel-toolbar" style="gap:10px;padding:8px;background:rgba(255,255,255,0.02);border-radius:8px;margin-bottom:12px;">
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn" id="ribbon-new">File</button>
            <button class="btn" id="ribbon-save">Lưu</button>
            <button class="btn" id="ribbon-undo">Hoàn tác</button>
          </div>
          <div>
            <input type="text" id="cellName" placeholder="A1" style="padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:inherit;">
          </div>
        </div>

        <div style="display:flex;overflow:auto;border-radius:8px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));">
          <div id="sheet-left" style="flex:0 0 56px;border-right:1px solid rgba(255,255,255,0.04);background:rgba(0,0,0,0.02);"></div>
          <div id="sheet-grid" style="overflow:auto;">
            <div id="sheet-table" style="display:table;border-collapse:collapse;"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- SETTINGS PAGE -->
    <section id="settings" class="page-content">
      <div class="card settings-group" id="settingsGroup" style="padding:18px;border-radius:12px;">
        <h3 style="margin-bottom:12px;font-weight:900">Cài đặt chung</h3>
        <div class="setting-item" style="margin-bottom:10px;">
          <label style="font-weight:700;">NÍ NÈ NÍ</label>
          <div style="margin-top:6px;">Tùy chọn vui vẻ...</div>
        </div>
        <div class="setting-item" style="margin-bottom:10px;">
          <label style="font-weight:700;">MÀU CHỦ ĐẠO</label>
          <input type="color" id="accentPicker" value="#8b5cf6" style="margin-top:6px;">
        </div>
        <div class="setting-item" style="margin-bottom:10px;">
          <label style="font-weight:700;">DỮ LIỆU</label>
          <div style="margin-top:6px;">Sao lưu / Xuất nhập...</div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:12px;">
          <button class="btn-save-bottom" id="saveSettings">LƯU THAY ĐỔI</button>
        </div>
      </div>
    </section>

  </main>

  <!-- Confirm Logout Modal -->
  <div class="modal-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-title" id="confirmTitle">Mày chắc chưa 🙄 ??</div>
      <p style="color:#cbd5e1;margin-bottom:12px;">Chọn một trong hai: <strong>Chắc</strong> (Không) hoặc <strong>Chắc chết liền</strong> (Có)</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="confirmNo">Chắc</button>
        <button class="btn-confirm" id="confirmYes">Chắc chết liền</button>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script>
  // --- Sidebar: Logout modal ---
  const logoutBtn = document.getElementById('logoutBtn');
  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmNo = document.getElementById('confirmNo');
  const confirmYes = document.getElementById('confirmYes');

  if(logoutBtn){
    logoutBtn.addEventListener('click', ()=> { confirmOverlay.style.display = 'flex'; confirmOverlay.setAttribute('aria-hidden','false'); });
  }
  if(confirmNo){ confirmNo.addEventListener('click', ()=> { confirmOverlay.style.display = 'none'; confirmOverlay.setAttribute('aria-hidden','true'); }); }
  if(confirmYes){ confirmYes.addEventListener('click', ()=> { window.location.href = './login.html'; }); }
  confirmOverlay.addEventListener('click', (e)=> { if(e.target === confirmOverlay) { confirmOverlay.style.display='none'; confirmOverlay.setAttribute('aria-hidden','true'); } });

  // --- Ensure the login icon/element is the emoji 🤪 if present ---
  (function setLoginIcon(){
    const sel = document.querySelector('#login-icon, .login-icon, .sidebar-avatar, [data-login-icon]');
    if(sel){
      if(sel.tagName === 'IMG'){
        sel.style.display='none';
        const span = document.createElement('span'); span.textContent='🤪'; span.style.fontSize='1.4rem'; sel.insertAdjacentElement('afterend', span);
      } else { sel.textContent='🤪'; sel.style.fontSize='1.6rem'; sel.style.lineHeight='1'; sel.style.display='flex'; sel.style.alignItems='center'; sel.style.justifyContent='center'; }
    }
  })();

  // --- Make sidebar behavior robust: JS-driven class toggle (works regardless of DOM siblings) ---
  (function sidebarOpenHandler(){
    const sidebar = document.querySelector('.sidebar');
    if(!sidebar) return;
    const openClass = 'sidebar-open';
    const main = document.querySelector('main.container');
    const rootStyle = getComputedStyle(document.documentElement);
    const expandedPadding = ()=> (parseFloat(rootStyle.getPropertyValue('--sidebar-width')) || 260) + 64;
    const collapsedPadding = ()=> (parseFloat(rootStyle.getPropertyValue('--sidebar-collapsed-width')) || 80) + 48;

    // initialize main padding to collapsed (inline) to be robust
    try{ if(main) main.style.paddingLeft = collapsedPadding() + 'px'; }catch(e){}

    // mouse
    sidebar.addEventListener('mouseenter', ()=>{
      document.body.classList.add(openClass);
      if(main) main.style.paddingLeft = expandedPadding() + 'px';
    });
    sidebar.addEventListener('mouseleave', ()=>{
      document.body.classList.remove(openClass);
      if(main) main.style.paddingLeft = collapsedPadding() + 'px';
    });
    // touch / focus-friendly: toggle on click for small screens
    sidebar.addEventListener('click', (e)=>{
      // ignore clicks on nav items to allow navigation
      if(e.target.closest('.nav-item')) return;
      const opened = document.body.classList.toggle(openClass);
      if(main) main.style.paddingLeft = (opened ? expandedPadding() : collapsedPadding()) + 'px';
    });
    // ensure closing when clicking outside (for touch devices)
    document.addEventListener('click', (e)=>{
      if(!document.body.classList.contains(openClass)) return;
      if(!e.target.closest('.sidebar')){
        document.body.classList.remove(openClass);
        if(main) main.style.paddingLeft = collapsedPadding() + 'px';
      }
    });
    // responsive: update on window resize (recompute CSS variables)
    window.addEventListener('resize', ()=>{
      // recompute rootStyle by re-reading
      const rs = getComputedStyle(document.documentElement);
      try{ if(document.body.classList.contains(openClass) && main) main.style.paddingLeft = (parseFloat(rs.getPropertyValue('--sidebar-width')) + 64) + 'px';
        else if(main) main.style.paddingLeft = (parseFloat(rs.getPropertyValue('--sidebar-collapsed-width')) + 48) + 'px'; }catch(e){}
    });
  })();

  // --- Background image uploader (pencil button) ---
  (function setupBackgroundPicker(){
    const btn = document.getElementById('bgPickerBtn'); if(!btn) return;
    const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.style.display='none'; document.body.appendChild(inp);
    btn.addEventListener('click', ()=> inp.click());
    inp.addEventListener('change', (e)=> { const f=e.target.files[0]; if(!f) return; const url=URL.createObjectURL(f); applyBackgroundImage(url, f); });
    ['dragenter','dragover'].forEach(ev => document.body.addEventListener(ev, (e)=> e.preventDefault()));
    document.body.addEventListener('drop', (e)=>{ e.preventDefault(); const dt=e.dataTransfer; if(dt && dt.files && dt.files[0]){ const f=dt.files[0]; if(f.type && f.type.startsWith('image/')){ const url = URL.createObjectURL(f); applyBackgroundImage(url,f); } }
    });
    async function applyBackgroundImage(url,file){ document.body.style.backgroundImage = `url('${url}')`; document.body.style.backgroundSize='cover'; document.body.style.backgroundPosition='center center'; try{ const img = await loadImage(url); const color = getDominantColor(img); document.documentElement.style.setProperty('--accent', color); document.documentElement.style.setProperty('--accent-dark', shade(color,-18)); }catch(err){ console.warn('Cannot compute dominant color', err); } }
    function loadImage(src){ return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }
    function getDominantColor(img){ const c=document.createElement('canvas'); const w=64,h=64; c.width=w; c.height=h; const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h); const d=ctx.getImageData(0,0,w,h).data; let r=0,g=0,b=0,count=0; for(let i=0;i<d.length;i+=4){ const a=d[i+3]; if(a<125) continue; r+=d[i]; g+=d[i+1]; b+=d[i+2]; count++; } if(!count) return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(); r=Math.round(r/count); g=Math.round(g/count); b=Math.round(b/count); return `rgb(${r}, ${g}, ${b})`; }
    function shade(rgb,percent){ let r,g,b; if(rgb.startsWith('rgb')){ [r,g,b]=rgb.match(/\d+/g).map(Number); } else if(rgb.startsWith('#')){ const hex=rgb.replace('#',''); r=parseInt(hex.substring(0,2),16); g=parseInt(hex.substring(2,4),16); b=parseInt(hex.substring(4,6),16); } else return rgb; const f=(n)=> Math.min(255, Math.max(0, Math.round(n + (percent/100)*255))); return `rgb(${f(r)}, ${f(g)}, ${f(b)})`; }
  })();

  // --- Excel cell click highlight ---
  document.addEventListener('pointerdown', (e)=>{
    const t = e.target;
    if(t.classList && t.classList.contains('excel-cell')){
      document.querySelectorAll('.excel-cell.highlighted').forEach(el=>{ el.classList.remove('highlighted'); el.style.boxShadow=''; el.style.borderColor=''; });
      t.classList.add('highlighted');
      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      t.style.boxShadow = `0 0 0 3px ${accent}`;
      t.style.borderColor = accent;
    }
  });

  // --- Calendar scaffold render ---
  (function renderCalendarScaffold(){
    const container = document.getElementById('vietnamCalendar'); if(!container) return;
    const today = new Date(); const year = today.getFullYear(); const month = today.getMonth();
    container.innerHTML = '';
    const head = document.createElement('div'); head.className='calendar-head'; head.style.display='flex'; head.style.justifyContent='space-between'; head.style.alignItems='center'; head.style.marginBottom='8px'; head.innerHTML = `<strong style="font-size:1.1rem">Lịch ${year}-${month+1}</strong><div style="display:flex;gap:8px"><button class='calendar-nav-btn' id='prevM'>&lt;</button><button class='calendar-nav-btn' id='nextM'>&gt;</button></div>`;
    container.appendChild(head);
    const grid = document.createElement('div'); grid.className='calendar-grid';
    const weekdays = ['CN','T2','T3','T4','T5','T6','T7']; weekdays.forEach(d=>{ const el=document.createElement('div'); el.className='calendar-cell weekday'; el.textContent=d; grid.appendChild(el); });
    const first = new Date(year, month, 1); const start = first.getDay(); const days = new Date(year, month+1,0).getDate();
    for(let i=0;i<start;i++){ const e=document.createElement('div'); e.className='calendar-cell empty'; grid.appendChild(e); }
    for(let d=1; d<=days; d++){ const e=document.createElement('div'); e.className='calendar-cell'; e.style.display='flex'; e.style.flexDirection='column'; e.style.alignItems='flex-start'; e.style.justifyContent='flex-start'; e.style.padding='8px'; const duong=document.createElement('div'); duong.textContent=d; duong.style.fontWeight='800'; duong.style.fontSize='1.05rem'; const am=document.createElement('div'); am.textContent=getLunarPlaceholder(year, month+1, d); am.style.fontSize='0.7rem'; am.style.opacity='0.85'; am.style.marginTop='4px'; const hol=document.createElement('div'); hol.style.fontSize='0.75rem'; hol.style.color='var(--accent)'; hol.style.marginTop='6px'; const holidayName = getHolidayName(year, month+1, d); if(holidayName) hol.textContent = holidayName; const note = document.createElement('textarea'); note.placeholder='Ghi chú...'; note.className='integrated-note'; note.style.height='54px'; note.style.marginTop='6px'; note.style.width='100%'; note.style.border='1px solid rgba(255,255,255,0.04)'; note.style.background='transparent'; note.style.color='inherit'; note.style.resize='none'; e.appendChild(duong); e.appendChild(am); if(holidayName) e.appendChild(hol); e.appendChild(note); grid.appendChild(e); }
    container.appendChild(grid);
    document.getElementById('prevM').addEventListener('click', ()=> alert('Chức năng đổi tháng sẽ được cập nhật.'));
    document.getElementById('nextM').addEventListener('click', ()=> alert('Chức năng đổi tháng sẽ được cập nhật.'));
  })();
  function getLunarPlaceholder(y,m,d){ const day = d % 30 || 30; return `Âm ${day}`; }
  function getHolidayName(yr, mo, day){ const k = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`; const holidays = { [`${yr}-01-01`]:'Tết Dương lịch', [`${yr}-04-30`]:'Ngày Giải phóng', [`${yr}-05-01`]:'Quốc tế Lao động', [`${yr}-09-02`]:'Quốc khánh' }; return holidays[k] || ''; }

  // --- Build basic Excel-like sheet scaffold ---
  (function buildBasicSheet(){
    const container = document.getElementById('excelApp'); if(!container) return;
    const left = container.querySelector('#sheet-left'); const tableWrap = container.querySelector('#sheet-table'); const rows = 60, cols = 24;
    // header
    const headerRow = document.createElement('div'); headerRow.style.display='table-row'; const spacer = document.createElement('div'); spacer.style.display='table-cell'; spacer.style.width='56px'; spacer.style.height='32px'; headerRow.appendChild(spacer);
    for(let c=0;c<cols;c++){ const cell = document.createElement('div'); cell.style.display='table-cell'; cell.style.padding='8px'; cell.style.minWidth='96px'; cell.style.border='1px solid rgba(255,255,255,0.04)'; cell.style.fontWeight='800'; cell.style.background='rgba(255,255,255,0.02)'; cell.textContent = String.fromCharCode(65 + (c % 26)) + (c>=26?Math.floor(c/26):''); headerRow.appendChild(cell); }
    tableWrap.appendChild(headerRow);
    for(let r=1;r<=rows;r++){ const rowNum = document.createElement('div'); rowNum.style.height='32px'; rowNum.style.display='flex'; rowNum.style.alignItems='center'; rowNum.style.justifyContent='center'; rowNum.style.borderTop='1px solid rgba(255,255,255,0.04)'; rowNum.textContent = r; left.appendChild(rowNum); const row = document.createElement('div'); row.style.display='table-row'; const rowSpacer = document.createElement('div'); rowSpacer.style.display='table-cell'; rowSpacer.style.height='32px'; row.appendChild(rowSpacer); for(let c=0;c<cols;c++){ const cell = document.createElement('div'); cell.contentEditable = true; cell.className = 'excel-cell'; cell.style.display='table-cell'; cell.style.padding='8px'; cell.style.minWidth='96px'; cell.style.border='1px solid rgba(255,255,255,0.04)'; cell.style.background='transparent'; cell.style.whiteSpace='nowrap'; row.appendChild(cell); } tableWrap.appendChild(row); }
    // freeze header top
    tableWrap.querySelectorAll('div[style*="display:table-row"]').forEach((r, idx)=>{ if(idx===0){ r.querySelectorAll('div').forEach(td=>{ td.style.position='sticky'; td.style.top='0'; td.style.zIndex='5'; }); } }); left.style.position='sticky'; left.style.top='0'; left.style.height='400px';
  })();

  // --- Page navigation simple ---
  document.querySelectorAll('.nav-item').forEach(it=>{
    it.addEventListener('click', ()=>{
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      it.classList.add('active');
      const p = it.getAttribute('data-page'); document.querySelectorAll('.page-content').forEach(pc=>pc.classList.remove('active-page'));
      const target = document.getElementById(p); if(target) target.classList.add('active-page');
    });
  });

  // --- Accent color picker in settings ---
  const accentPicker = document.getElementById('accentPicker'); if(accentPicker){ accentPicker.addEventListener('input', (e)=>{ document.documentElement.style.setProperty('--accent', e.target.value); document.documentElement.style.setProperty('--accent-dark', e.target.value); }); }

  </script>
</body>
