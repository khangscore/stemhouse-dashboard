<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Super Edition</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2243%22 fill=%22%23FFD133%22/><circle cx=%2232%22 cy=%2238%22 r=%2214%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><circle cx=%2232%22 cy=%2238%22 r=%225%22 fill=%22black%22/><circle cx=%2268%22 cy=%2230%22 r=%2210%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><circle cx=%2268%22 cy=%2230%22 r=%224%22 fill=%22black%22/><path d=%22M 25 55 L 75 55 Q 75 80 50 80 Q 25 80 25 55 Z%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><path d=%22M 40 55 Q 50 85 70 70 L 60 55 Z%22 fill=%22%23FF4747%22 stroke=%22black%22 stroke-width=%221.5%22/><rect x=%2227%22 y=%2255%22 width=%2246%22 height=%226%22 fill=%22white%22/></svg>">

  <style>
    :root {
      --bg-color: #0f0720; --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.2); --text-main: #ffffff;
      --accent: #22c55e; --sidebar-width: 260px; --sidebar-collapsed-width: 80px;
    }

    body.light-mode {
      --bg-color: #f8fafc; --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.1); --text-main: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; transition: background 0.3s, color 0.3s; }

    body {
      background: var(--bg-color);
      background-image: radial-gradient(circle at 50% -20%, #4c1d95, #1e1045, #0f0720);
      background-attachment: fixed; color: var(--text-main); min-height: 100vh; overflow-x: hidden;
    }
    body.light-mode { background-image: radial-gradient(circle at 50% -20%, #e2e8f0, #f8fafc); }

    /* Sidebar Arrow Căn giữa */
    .sidebar {
      position: fixed; top: 20px; left: 20px; bottom: 20px;
      width: var(--sidebar-collapsed-width); background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px); border: 1px solid var(--card-border);
      border-radius: 24px; z-index: 2000; transition: width 0.4s; display: flex; flex-direction: column;
    }
    .sidebar.expanded { width: var(--sidebar-width); border-color: var(--accent); }

    .toggle-sidebar {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--accent); border: 2px solid #000; color: #000;
      width: 50px; height: 22px; border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: bold;
    }
    .toggle-sidebar span { transition: 0.4s; font-size: 14px; line-height: 1; }
    .sidebar.expanded .toggle-sidebar span { transform: rotate(180deg); }

    .sidebar-header { padding: 60px 0 10px 0; display: flex; flex-direction: column; align-items: center; }
    .sidebar-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); background: #fff; object-fit: cover; }
    .sidebar.expanded .sidebar-avatar { width: 90px; height: 90px; }
    .sidebar-username { margin-top: 12px; font-weight: bold; font-size: 0.9rem; color: var(--accent); opacity: 0; white-space: nowrap; transition: 0.3s; }
    .sidebar.expanded .sidebar-username { opacity: 1; }

    .nav-content { flex-grow: 1; margin-top: 20px; width: 100%; }
    .nav-item { display: flex; align-items: center; justify-content: center; padding: 15px 0; margin: 8px 10px; border-radius: 16px; cursor: pointer; transition: 0.3s; }
    .sidebar.expanded .nav-item { justify-content: flex-start; padding-left: 20px; }
    .nav-item.active { background: var(--accent); color: #000; font-weight: bold; }
    .nav-text { width: 0; opacity: 0; visibility: hidden; transition: 0.2s; margin-left: 10px; }
    .sidebar.expanded .nav-text { width: auto; opacity: 1; visibility: visible; }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px 100px 120px; }
    .header-group { text-align: center; margin-bottom: 50px; }
    .header-group h1 { font-size: 4rem; letter-spacing: -3px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }

    /* Card & Cài đặt - Tự động giãn khung */
    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 28px; padding: 30px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      transition: 0.3s; backdrop-filter: blur(10px); position: relative;
      height: auto; min-height: 200px;
    }
    .card:hover { transform: translateY(-8px); border-color: var(--accent); }
    .btn { width: 100%; padding: 12px; background: var(--accent); color: #000; text-decoration: none; border-radius: 14px; font-weight: bold; margin-top: 15px; border: none; cursor: pointer; }
    
    .btn-delete { position: absolute; top: 15px; right: 15px; width: 25px; height: 25px; background: rgba(255,0,0,0.2); color: #ff4747; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: 0.3s; font-weight: bold; border: none; }
    .card:hover .btn-delete { opacity: 1; }

    /* Modal Thêm Lối Tắt */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal { background: #202124; width: 450px; border-radius: 12px; padding: 24px; color: #e8eaed; }
    .modal label { display: block; font-size: 12px; margin-bottom: 8px; color: #9aa0a6; text-align: left; }
    .modal input { width: 100%; background: #303134; border: none; border-bottom: 2px solid var(--accent); padding: 10px; color: #fff; margin-bottom: 20px; outline: none; }
    
    .emoji-picker { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; max-height: 150px; overflow-y: auto; background: #303134; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
    .emoji-item { cursor: pointer; font-size: 22px; text-align: center; padding: 5px; border-radius: 5px; }
    .emoji-item:hover, .emoji-item.selected { background: var(--accent); }

    /* Settings section */
    .settings-section { display: none; }
    .avatar-preview-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 15px; background: #fff; object-fit: cover; }
    .gender-group { display: flex; gap: 8px; width: 100%; flex-wrap: wrap; }
    .gender-btn { flex: 1; min-width: 80px; opacity: 0.5; }
    .gender-btn.active { opacity: 1; border: 2px solid white; }
    
    .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
    .color-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .color-dot.active { border-color: white; transform: scale(1.1); }

    /* Custom Alert Box */
    .alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 10000; }
    .alert-box { background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; border: 2px solid #ff4747; }
    
    .theme-switch { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3000; font-size: 1.5rem; }
  </style>
</head>
<body id="body">

  <aside class="sidebar" id="sidebar">
    <button class="toggle-sidebar" id="toggleBtn"><span>❯</span></button>
    <div class="sidebar-header">
      <img id="sidebarAvatar" class="sidebar-avatar" src="https://api.dicebear.com/7.x/miniavs/svg?seed=Liam" alt="User">
      <span id="sidebarUsernameDisplay" class="sidebar-username">Ní Hào Ma</span>
    </div>
    <div class="nav-content">
      <div class="nav-item active" id="nav-dashboard" onclick="switchPage('dashboard')"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></div>
      <div class="nav-item" id="nav-settings" onclick="switchPage('settings')"><span class="nav-icon">⚙️</span><span class="nav-text">Cài đặt</span></div>
    </div>
  </aside>

  <div class="container">
    <div id="page-dashboard">
      <div class="header-group">
        <h1 id="mainTitle">AO Dashboard Q10</h1>
        <p id="greeting">Haku_Na_Matata!</p>
      </div>
      <div class="grid" id="shortcutGrid"></div>
    </div>

    <!-- 1 & 3. TRANG CÀI ĐẶT CẢI TIẾN -->
    <div id="page-settings" class="settings-section">
      <div class="header-group"><h1>Cài đặt</h1></div>
      <div class="grid">
        <div class="card" style="grid-column: span 2;">
          <h3>Thông Tin Của Ní</h3>
          <!-- Preview Avatar -->
          <img id="previewAvatar" class="avatar-preview-box" src="https://api.dicebear.com/7.x/miniavs/svg?seed=Liam" alt="Preview">
          <input type="text" id="usernameInput" style="width:100%; padding:12px; border-radius:10px; background:rgba(0,0,0,0.1); color:#fff; border:1px solid var(--card-border);" placeholder="Tên của ní...">
          
          <div class="gender-group" style="margin-top: 15px;">
            <button class="btn gender-btn active" id="btn-male" onclick="updatePreview('male')">Liam</button>
            <button class="btn gender-btn" id="btn-female" onclick="updatePreview('female')" style="background: #ec4899;">Adrian</button>
            <button class="btn gender-btn" id="btn-dog" onclick="updatePreview('dog')" style="background: #f59e0b;">Luis</button>
          </div>
          <button class="btn" style="background: #3b82f6; color: #fff;" onclick="saveAllSettings()">💾 LƯU THAY ĐỔI</button>
        </div>

        <div class="card">
          <h3>Màu Chủ Đạo (8 Màu)</h3>
          <div class="color-grid">
            <div class="color-dot" style="background: #22c55e;" onclick="setAccent('#22c55e')"></div>
            <div class="color-dot" style="background: #3b82f6;" onclick="setAccent('#3b82f6')"></div>
            <div class="color-dot" style="background: #ef4444;" onclick="setAccent('#ef4444')"></div>
            <div class="color-dot" style="background: #a855f7;" onclick="setAccent('#a855f7')"></div>
            <div class="color-dot" style="background: #f59e0b;" onclick="setAccent('#f59e0b')"></div>
            <div class="color-dot" style="background: #06b6d4;" onclick="setAccent('#06b6d4')"></div>
            <div class="color-dot" style="background: #ec4899;" onclick="setAccent('#ec4899')"></div>
            <div class="color-dot" style="background: #71717a;" onclick="setAccent('#71717a')"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Thêm lối tắt -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Thêm lối tắt</h2>
      <label>Chọn Icon (Kho Objects)</label>
      <div class="emoji-picker" id="emojiPicker"></div>
      <label>Tên</label>
      <input type="text" id="shortcutName" placeholder="Tên hiển thị...">
      <label>URL</label>
      <input type="text" id="shortcutUrl" placeholder="https://...">
      <div class="modal-btns">
        <button class="modal-btn" onclick="closeModal()">Huỷ</button>
        <button class="modal-btn primary" onclick="addShortcut()">Xong</button>
      </div>
    </div>
  </div>

  <!-- Alert Xoá -->
  <div class="alert-overlay" id="alertOverlay">
    <div class="alert-box">
      <h2 style="color: #ff4747; margin-bottom: 20px;">Mày chắc chưaaa?</h2>
      <div style="display: flex; gap: 15px; justify-content: center;">
        <button class="btn" style="background: #ff4747; color: #fff; width: auto; padding: 10px 30px;" id="confirmYes">CHẮC</button>
        <button class="btn" style="background: #333; color: #fff; width: auto; padding: 10px 30px;" onclick="closeAlert()">CHẮC chớt liền</button>
      </div>
    </div>
  </div>

  <div class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙</div>

  <script>
    // 2. Bổ sung bộ Icon Objects từ piliapp
    const objectEmojis = [
      '🔑','📘','🧾','📚','🎁','💡','💻','📱','⌚','📁','📂','📅','📦','✉️','📧','📢','🔔','🎵','🎨','🎬','🎮','📷','🎤','🎧','📣','🔦','🔨','🛠️','🔧','🔩','⚙️','⚖️','🔗','⛓️','💊','🚬','⚗️','🔭','🔬','🔋','🔌','💻','🖥️','🖨️','⌨️','🖱️','💽','💾','💿','📀'
    ];

    const defaultLinks = [
      {id: 'd1', name: 'Course Key AE', url: 'https://learn.eltngl.com/', icon: '🔑'},
      {id: 'd2', name: 'Học Cụ & In Ấn', url: 'https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7BD651B68A-99FC-4B10-82CD-A6F475821593%7D&file=H%25u1eccC%20C%25u1ee4%20-%20NCT.xlsx', icon: '📘'},
      {id: 'd3', name: 'Hóa Đơn VAT', url: 'https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7B0EF1083E-E86B-5708-397A-15B22C51A364%7D&file=Q10_HO%C3%81%20%C4%90%C6%A0N%20VAT.xlsx', icon: '🧾'},
      {id: 'd4', name: 'Kho Sách', url: 'https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7B2E6C9D9F-3E1B-5A31-B9D1-530F93955649%7D&file=2026-KHO-SACH-NGUYEN-CHI-THANH.xlsx', icon: '📚'},
      {id: 'd5', name: 'Quà Tặng HS', url: 'https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7B361EB4A0-4B6F-44F9-9AA2-0A0D08AD4B72%7D&file=2025-2026_QU%C3%80%20T%E1%BA%B6NG%20HS.xlsx', icon: '🎁'}
    ];

    let selectedEmoji = '🔗';
    let appConfig = JSON.parse(localStorage.getItem('ao_v4_config')) || { 
      name: "Ní Hào Ma", gender: "male", accent: "#22c55e", isLightMode: false 
    };
    let userShortcuts = JSON.parse(localStorage.getItem('user_shortcuts_v4')) || defaultLinks;
    let deleteId = null;

    function renderShortcuts() {
      const grid = document.getElementById('shortcutGrid');
      grid.innerHTML = userShortcuts.map(s => `
        <div class="card">
          <button class="btn-delete" onclick="askDelete('${s.id}')">✕</button>
          <div style="font-size: 50px; margin-bottom: 10px;">${s.icon}</div>
          <h3>${s.name}</h3>
          <a class="btn" href="${s.url}" target="_blank">Mở</a>
        </div>`).join('') + `
        <div class="card add-card" onclick="openModal()">
          <div style="font-size: 60px; color: var(--accent);">+</div><p>Thêm lối tắt</p>
        </div>`;
    }

    // Preview Avatar realtime
    function updatePreview(g) {
      appConfig.tempGender = g;
      const seeds = { male: 'Liam', female: 'Adrian', dog: 'Luis' };
      document.getElementById('previewAvatar').src = `https://api.dicebear.com/7.x/miniavs/svg?seed=${seeds[g]}`;
      document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${g}`).classList.add('active');
    }

    function saveAllSettings() {
      appConfig.name = document.getElementById('usernameInput').value || appConfig.name;
      if(appConfig.tempGender) appConfig.gender = appConfig.tempGender;
      localStorage.setItem('ao_v4_config', JSON.stringify(appConfig));
      applyConfig();
      alert("Đã lưu thành công!");
    }

    function setAccent(c) {
      appConfig.accent = c;
      document.documentElement.style.setProperty('--accent', c);
      localStorage.setItem('ao_v4_config', JSON.stringify(appConfig));
    }

    function applyConfig() {
      document.documentElement.style.setProperty('--accent', appConfig.accent);
      document.getElementById('body').classList.toggle('light-mode', appConfig.isLightMode);
      document.getElementById('sidebarUsernameDisplay').innerText = appConfig.name;
      document.getElementById('usernameInput').value = appConfig.name;
      const seeds = { male: 'Liam', female: 'Adrian', dog: 'Luis' };
      const avatarUrl = `https://api.dicebear.com/7.x/miniavs/svg?seed=${seeds[appConfig.gender]}`;
      document.getElementById('sidebarAvatar').src = avatarUrl;
      document.getElementById('previewAvatar').src = avatarUrl;
      document.getElementById('greeting').innerText = `Haku_Na_Matata, ${appConfig.name}! 🚀`;
      document.getElementById('themeBtn').innerText = appConfig.isLightMode ? "☀️" : "🌙";
    }

    function initEmojiPicker() {
      const picker = document.getElementById('emojiPicker');
      picker.innerHTML = objectEmojis.map(e => `<span class="emoji-item" onclick="selectEmoji(this, '${e}')">${e}</span>`).join('');
    }
    function selectEmoji(el, e) {
      document.querySelectorAll('.emoji-item').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
      selectedEmoji = e;
    }

    function switchPage(page) {
      document.getElementById('page-dashboard').style.display = (page === 'dashboard' ? 'block' : 'none');
      document.getElementById('page-settings').style.display = (page === 'settings' ? 'block' : 'none');
      document.getElementById('nav-dashboard').classList.toggle('active', page === 'dashboard');
      document.getElementById('nav-settings').classList.toggle('active', page === 'settings');
    }

    function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function askDelete(id) { deleteId = id; document.getElementById('alertOverlay').style.display = 'flex'; }
    function closeAlert() { document.getElementById('alertOverlay').style.display = 'none'; }
    
    document.getElementById('confirmYes').onclick = () => {
      userShortcuts = userShortcuts.filter(s => s.id !== deleteId);
      localStorage.setItem('user_shortcuts_v4', JSON.stringify(userShortcuts));
      renderShortcuts(); closeAlert();
    };

    function addShortcut() {
      const url = document.getElementById('shortcutUrl').value;
      if(!url) return alert("Thiếu link kìa ní!");
      userShortcuts.push({ id: Date.now().toString(), name: document.getElementById('shortcutName').value || "Lối tắt", url, icon: selectedEmoji });
      localStorage.setItem('user_shortcuts_v4', JSON.stringify(userShortcuts));
      renderShortcuts(); closeModal();
    }

    function toggleTheme() { appConfig.isLightMode = !appConfig.isLightMode; localStorage.setItem('ao_v4_config', JSON.stringify(appConfig)); applyConfig(); }
    document.getElementById('toggleBtn').onclick = () => document.getElementById('sidebar').classList.toggle('expanded');

    window.onload = () => { renderShortcuts(); initEmojiPicker(); applyConfig(); };
  </script>
</body>
</html>
