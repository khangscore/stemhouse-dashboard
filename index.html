<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Custom Edition</title>
  
  <!-- Thêm bộ font Noto Color Emoji của Google -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='black'/%3E%3Ccircle cx='50' cy='50' r='43' fill='%23FFD133'/%3E%3Ccircle cx='32' cy='38' r='14' fill='white' stroke='black' stroke-width='2'/%3E%3Ccircle cx='32' cy='38' r='5' fill='black'/%3E%3Ccircle cx='68' cy='30' r='10' fill='white' stroke='black' stroke-width='2'/%3E%3Ccircle cx='68' cy='30' r='4' fill='black'/%3E%3Cpath d='M 25 55 L 75 55 Q 75 80 50 80 Q 25 80 25 55 Z' fill='white' stroke='black' stroke-width='2'/%3E%3Cpath d='M 40 55 Q 50 85 70 70 L 60 55 Z' fill='%23FF4747' stroke='black' stroke-width='1.5'/%3E%3Crect x='27' y='55' width='46' height='6' fill='white'/%3E%3C/svg%3E">

  <style>
    :root {
      --bg-color: #0f0720; --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.2); --text-main: #ffffff;
      --accent: #22c55e; --liam-blue: #3b82f6; --sidebar-width: 260px; --sidebar-collapsed-width: 80px;
    }

    body.light-mode {
      --bg-color: #f8fafc; --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.1); --text-main: #1e293b;
    }

    /* Đảm bảo render font Noto Color Emoji cho các biểu tượng */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "Noto Color Emoji", sans-serif; transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s; }

    body {
      background: var(--bg-color);
      background-image: radial-gradient(circle at 50% -20%, #4c1d95, #1e1045, #0f0720);
      background-attachment: fixed; color: var(--text-main); min-height: 100vh; overflow-x: hidden;
    }
    body.light-mode { background-image: radial-gradient(circle at 50% -20%, #e2e8f0, #f8fafc); }

    /* ====== HIỆU ỨNG SÁNG NHẸ (GLOW) ĐÃ GIẢM CƯỜNG ĐỘ ====== */
    .card:hover, .btn:hover, .btn-save-fixed:hover, .theme-switch:hover, .color-dot:hover, .nav-item:not(.active):hover {
      box-shadow: 0 0 12px var(--accent) !important;
      background: rgba(255, 255, 255, 0.12); /* Sáng nhẹ nền để rõ mục bên trong */
    }
    .card:hover { transform: translateY(-5px); border-color: var(--accent); }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 20px; left: 20px; bottom: 20px;
      width: var(--sidebar-collapsed-width); background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px); border: 1px solid var(--card-border);
      border-radius: 24px; z-index: 2000; transition: width 0.4s; display: flex; flex-direction: column;
    }
    .sidebar.expanded { width: var(--sidebar-width); border-color: var(--accent); }

    .toggle-sidebar {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--accent); border: 2px solid #000; color: #000;
      width: 50px; height: 22px; border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: bold; transition: 0.3s;
    }
    .sidebar.expanded .toggle-sidebar span { transform: rotate(180deg); }

    .sidebar-header { padding: 60px 0 10px 0; display: flex; flex-direction: column; align-items: center; }
    .sidebar-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); background: #fff; object-fit: cover; }
    .sidebar-avatar.avatar-male { border-color: var(--liam-blue) !important; }
    
    .sidebar.expanded .sidebar-avatar { width: 90px; height: 90px; }
    .sidebar-username { margin-top: 12px; font-weight: bold; font-size: 0.9rem; color: var(--accent); opacity: 0; white-space: nowrap; transition: 0.3s; }
    .sidebar.expanded .sidebar-username { opacity: 1; }

    .nav-content { flex-grow: 1; margin-top: 20px; width: 100%; }
    .nav-item { display: flex; align-items: center; justify-content: center; padding: 15px 0; margin: 8px 10px; border-radius: 16px; cursor: pointer; transition: 0.3s; }
    .sidebar.expanded .nav-item { justify-content: flex-start; padding-left: 20px; }
    .nav-item.active { background: var(--accent); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--accent); }
    .nav-text { width: 0; opacity: 0; visibility: hidden; transition: 0.2s; margin-left: 10px; }
    .sidebar.expanded .nav-text { width: auto; opacity: 1; visibility: visible; }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px 100px 120px; position: relative; }
    .header-group { text-align: center; margin-bottom: 50px; }
    .header-group h1 { font-size: 4rem; letter-spacing: -3px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }

    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 28px; padding: 30px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); backdrop-filter: blur(10px); position: relative;
      min-height: 200px; justify-content: center;
    }
    
    .add-card { cursor: pointer; border-style: dashed; border-width: 2px; }
    .add-card .plus-icon { font-size: 80px; color: var(--accent); line-height: 1; font-weight: 300; }
    .add-card .add-text { margin-top: 10px; font-weight: bold; color: var(--text-main); opacity: 0.8; }

    .btn { width: 100%; padding: 12px; background: var(--accent); color: #000; text-decoration: none; border-radius: 14px; font-weight: bold; margin-top: 15px; border: none; cursor: pointer; }
    
    .btn-delete { position: absolute; top: 15px; right: 15px; width: 25px; height: 25px; background: rgba(255,0,0,0.2); color: #ff4747; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: 0.3s; font-weight: bold; border: none; z-index: 10; }
    .card:hover .btn-delete { opacity: 1; }
    .btn-delete:hover { background: #ff4747; color: #fff; box-shadow: 0 0 10px #ff4747 !important; }

    /* Trang Cài đặt */
    .settings-section { display: none; position: relative; }
    .btn-save-fixed {
      position: absolute; top: -10px; right: 0;
      width: auto; padding: 10px 25px; background: #22c55e !important; color: #fff !important;
      border-radius: 12px; font-weight: bold; border: none; cursor: pointer;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); z-index: 100;
    }

    .avatar-preview-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--accent); margin-bottom: 10px; background: #fff; object-fit: cover; }
    .avatar-preview-box.avatar-male { border-color: var(--liam-blue) !important; }
    
    .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }

    .theme-switch { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3000; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

    /* ====== MODAL THÔNG BÁO / THÊM LINK ====== */
    .modal-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; z-index: 10002; 
    }
    .modal-box {
      background: #202124; width: 100%; max-width: 450px; border-radius: 16px; 
      padding: 24px; color: #e8eaed; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1); text-align: center;
    }
    .modal-box h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 20px; color: #fff; }
    
    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; font-size: 0.8rem; color: #9aa0a6; margin-bottom: 5px; }
    .input-group input { 
      width: 100%; background: #303134; border: none; padding: 10px 14px; 
      color: #e8eaed; border-radius: 8px; outline: none; border-bottom: 2px solid transparent;
    }
    .input-group input:focus { border-bottom-color: var(--accent); }

    /* Lưới chọn Icon Mở rộng */
    .emoji-grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
      background: #303134; padding: 12px; border-radius: 10px; margin-bottom: 20px;
      max-height: 200px; overflow-y: auto;
    }
    .emoji-item {
      font-size: 1.8rem; cursor: pointer; padding: 8px; border-radius: 10px; border: 2px solid transparent;
    }
    .emoji-item.selected { border-color: var(--accent); background: rgba(255,255,255,0.05); }

    .modal-actions { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
    .modal-actions button {
      padding: 10px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; border: none;
    }
    .btn-confirm { background: #ff4747; color: #fff; }
    .btn-cancel { background: #3c4043; color: #fff; }
    .btn-cancel:hover { background: #5f6368; }

  </style>
</head>
<body id="body">

  <aside class="sidebar" id="sidebar">
    <button class="toggle-sidebar" id="toggleBtn"><span>❯</span></button>
    <div class="sidebar-header">
      <img id="sidebarAvatar" class="sidebar-avatar" src="https://api.dicebear.com/7.x/miniavs/svg?seed=Liam" alt="User">
      <span id="sidebarUsernameDisplay" class="sidebar-username">Ní Hào Ma</span>
    </div>
    <div class="nav-content">
      <div class="nav-item active" id="nav-dashboard" onclick="switchPage('dashboard')"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></div>
      <div class="nav-item" id="nav-settings" onclick="switchPage('settings')"><span class="nav-icon">⚙️</span><span class="nav-text">Cài đặt</span></div>
    </div>
  </aside>

  <div class="container">
    <div id="page-dashboard">
      <div class="header-group">
        <h1 id="mainTitle">AO Dashboard Q10</h1>
        <p id="greeting">Haku_Na_Matata!</p>
      </div>
      <div class="grid" id="shortcutGrid"></div>
    </div>

    <div id="page-settings" class="settings-section">
      <button class="btn-save-fixed" onclick="saveAllSettings()">💾 LƯU THAY ĐỔI</button>
      <div class="header-group"><h1>Cài đặt</h1></div>
      
      <div class="grid" style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
        <div class="card" style="width: 100%; max-width: 450px;">
          <h3 style="margin-bottom: 15px;">Thông Tin Của Ní</h3>
          <img id="previewAvatar" class="avatar-preview-box" src="https://api.dicebear.com/7.x/miniavs/svg?seed=Liam" alt="Preview">
          <input type="text" id="usernameInput" style="width:100%; padding:10px; border-radius:10px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid var(--card-border);" placeholder="Tên của ní...">
          
          <div style="display: flex; gap: 8px; width: 100%; margin-top: 15px;">
            <button class="btn" style="flex:1; padding: 8px; opacity:0.6; background: #3b82f6; color: #fff;" id="btn-male" onclick="updatePreview('male')">Liam</button>
            <button class="btn" style="flex:1; padding: 8px; opacity:0.6; background:#ec4899; color: #fff;" id="btn-female" onclick="updatePreview('female')">Adrian</button>
            <button class="btn" style="flex:1; padding: 8px; opacity:0.6; background:#f59e0b; color: #fff;" id="btn-dog" onclick="updatePreview('dog')">Luis</button>
          </div>
        </div>

        <div class="card" style="padding: 20px;">
          <h3 style="margin-bottom: 10px; font-size: 1rem;">Màu Chủ Đạo (Ngoại trừ Liam)</h3>
          <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
            <div class="color-dot" style="background: #22c55e;" onclick="setAccent('#22c55e')"></div>
            <div class="color-dot" style="background: #ef4444;" onclick="setAccent('#ef4444')"></div>
            <div class="color-dot" style="background: #a855f7;" onclick="setAccent('#a855f7')"></div>
            <div class="color-dot" style="background: #f59e0b;" onclick="setAccent('#f59e0b')"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL THÊM LỐI TẮT -->
  <div class="modal-overlay" id="addShortcutModal">
    <div class="modal-box">
      <h2 style="text-align: left;">Thêm lối tắt</h2>
      <div class="input-group"><label>Tên</label><input type="text" id="newLinkName" placeholder="Ví dụ: Kho Sách"></div>
      <div class="input-group"><label>URL</label><input type="text" id="newLinkUrl" placeholder="https://..."></div>
      <div class="emoji-grid" id="emojiGrid"></div>
      <div class="modal-actions" style="justify-content: flex-end;">
        <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
        <button class="btn" style="width: auto; margin-top:0;" onclick="saveNewLink()">Xong</button>
      </div>
    </div>
  </div>

  <!-- MODAL CẢNH BÁO "MÀY CHẮC CHƯA" -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <div style="font-size: 3rem; margin-bottom: 10px;">🤨</div>
      <h2>MÀY CHẮC CHƯAAA???</h2>
      <div class="modal-actions">
        <button class="btn-confirm" id="btnFinalSure">CHẮC</button>
        <button class="btn-cancel" onclick="closeConfirm()">CHẮC chớt liền</button>
      </div>
    </div>
  </div>

  <div class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙</div>

  <script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playHoverSound() {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function addHoverEvents() {
      document.querySelectorAll('.card, .nav-item, .btn, .btn-save-fixed, .color-dot, .theme-switch, .emoji-item, .btn-confirm, .btn-cancel').forEach(el => {
        el.onmouseenter = playHoverSound;
      });
    }

    let appConfig = JSON.parse(localStorage.getItem('ao_v6_config')) || { name: "Ní Hào Ma", gender: "male", accent: "#22c55e", isLightMode: false };
    let userShortcuts = JSON.parse(localStorage.getItem('user_shortcuts_v6')) || [
      {id: '1', name: 'Course Key AE', url: 'https://learn.eltngl.com/', icon: '🔑'},
      {id: '2', name: 'Kho Sách', url: '#', icon: '📚'}
    ];

    // Bộ Icon Mở Rộng
    const availableEmojis = ['🔗','🔑','📘','📄','📚','🎁','💻','📊','📝','🎨','🎵','⚙️','🚀','💡','🌟','📁','🔥','🌈','🍔','🍕','🎮','🎧','📸','🛠️','🧪','🛰️','👾','👻','🐼','🦊'];
    let selectedEmoji = '🔗';
    let pendingDeleteId = null;

    function renderShortcuts() {
      const grid = document.getElementById('shortcutGrid');
      grid.innerHTML = userShortcuts.map(s => `
        <div class="card">
          <button class="btn-delete" onclick="askDelete('${s.id}')">✕</button>
          <div style="font-size: 50px;">${s.icon}</div>
          <h3>${s.name}</h3>
          <a class="btn" href="${s.url}" target="_blank">Mở</a>
        </div>`).join('') + `
        <div class="card add-card" onclick="openModal()">
          <div class="plus-icon">+</div>
          <div class="add-text">Thêm link</div>
        </div>`;
      addHoverEvents();
    }

    /* ====== MODAL XỬ LÝ ====== */
    function renderEmojis() {
      const grid = document.getElementById('emojiGrid');
      grid.innerHTML = availableEmojis.map(e => `<div class="emoji-item ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
      addHoverEvents();
    }
    function selectEmoji(e) { selectedEmoji = e; renderEmojis(); }
    function openModal() { document.getElementById('addShortcutModal').style.display = 'flex'; renderEmojis(); }
    function closeModal() { document.getElementById('addShortcutModal').style.display = 'none'; }

    function askDelete(id) {
      pendingDeleteId = id;
      document.getElementById('confirmModal').style.display = 'flex';
    }
    function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; }
    document.getElementById('btnFinalSure').onclick = () => {
      userShortcuts = userShortcuts.filter(s => s.id !== pendingDeleteId);
      localStorage.setItem('user_shortcuts_v6', JSON.stringify(userShortcuts));
      renderShortcuts();
      closeConfirm();
    };

    function saveNewLink() {
      const name = document.getElementById('newLinkName').value.trim();
      const url = document.getElementById('newLinkUrl').value.trim() || '#';
      if (!name) return;
      userShortcuts.push({ id: Date.now().toString(), name, url, icon: selectedEmoji });
      localStorage.setItem('user_shortcuts_v6', JSON.stringify(userShortcuts));
      renderShortcuts();
      closeModal();
    }

    /* ====== CÀI ĐẶT ====== */
    function updatePreview(g) {
      appConfig.tempGender = g;
      const seeds = { male: 'Liam', female: 'Adrian', dog: 'Luis' };
      document.getElementById('previewAvatar').src = `https://api.dicebear.com/7.x/miniavs/svg?seed=${seeds[g]}`;
      document.querySelectorAll('#page-settings .btn').forEach(b => b.style.opacity = '0.6');
      document.getElementById(`btn-${g}`).style.opacity = '1';
    }
    function setAccent(c) {
      appConfig.accent = c;
      document.documentElement.style.setProperty('--accent', c);
      localStorage.setItem('ao_v6_config', JSON.stringify(appConfig));
    }
    function saveAllSettings() {
      appConfig.name = document.getElementById('usernameInput').value || appConfig.name;
      if(appConfig.tempGender) appConfig.gender = appConfig.tempGender;
      localStorage.setItem('ao_v6_config', JSON.stringify(appConfig));
      applyConfig(); 
      alert("Đã lưu!");
    }
    function applyConfig() {
      document.documentElement.style.setProperty('--accent', appConfig.accent);
      document.getElementById('body').classList.toggle('light-mode', appConfig.isLightMode);
      document.getElementById('sidebarUsernameDisplay').innerText = appConfig.name;
      const seeds = { male: 'Liam', female: 'Adrian', dog: 'Luis' };
      document.getElementById('sidebarAvatar').src = `https://api.dicebear.com/7.x/miniavs/svg?seed=${seeds[appConfig.gender]}`;
      document.getElementById('greeting').innerText = `Haku_Na_Matata, ${appConfig.name}! 🚀`;
    }
    function toggleTheme() { appConfig.isLightMode = !appConfig.isLightMode; applyConfig(); }
    function switchPage(p) {
      document.getElementById('page-dashboard').style.display = (p === 'dashboard' ? 'block' : 'none');
      document.getElementById('page-settings').style.display = (p === 'settings' ? 'block' : 'none');
    }
    document.getElementById('toggleBtn').onclick = () => document.getElementById('sidebar').classList.toggle('expanded');
    window.onload = () => { renderShortcuts(); applyConfig(); updatePreview(appConfig.gender); };
  </script>
</body>
</html>
