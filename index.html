<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Ultimate Edition</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2243%22 fill=%22%23FFD133%22/><circle cx=%2232%22 cy=%2238%22 r=%2214%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><circle cx=%2232%22 cy=%2238%22 r=%225%22 fill=%22black%22/><circle cx=%2268%22 cy=%2230%22 r=%2210%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><circle cx=%2268%22 cy=%2230%22 r=%224%22 fill=%22black%22/><path d=%22M 25 55 L 75 55 Q 75 80 50 80 Q 25 80 25 55 Z%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><path d=%22M 40 55 Q 50 85 70 70 L 60 55 Z%22 fill=%22%23FF4747%22 stroke=%22black%22 stroke-width=%221.5%22/><rect x=%2227%22 y=%2255%22 width=%2246%22 height=%226%22 fill=%22white%22/></svg>">

  <style>
    :root {
      --bg-color: #0f0720; 
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.2); 
      --text-main: #ffffff;
      --accent: #22c55e;
      --sidebar-collapsed-width: 80px;
      --sidebar-width: 260px;
    }

    body.light-mode {
      --bg-color: #f8fafc;
      --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.1);
      --text-main: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; transition: background 0.3s, color 0.3s; }
    body { background: var(--bg-color); background-image: radial-gradient(circle at 50% -20%, #4c1d95, #1e1045, #0f0720); background-attachment: fixed; color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
    body.light-mode { background-image: radial-gradient(circle at 50% -20%, #e2e8f0, #f8fafc); }

    /* 1. Mũi tên Sidebar Căn Giữa */
    .sidebar { position: fixed; top: 20px; left: 20px; bottom: 20px; width: var(--sidebar-collapsed-width); background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(25px); border: 1px solid var(--card-border); border-radius: 24px; z-index: 2000; transition: 0.4s; display: flex; flex-direction: column; }
    .sidebar.expanded { width: var(--sidebar-width); border-color: var(--accent); }
    .toggle-sidebar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: var(--accent); border: 2px solid #000; color: #000; width: 50px; height: 22px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .toggle-sidebar span { transition: 0.4s; font-size: 14px; line-height: 1; }
    .sidebar.expanded .toggle-sidebar span { transform: rotate(180deg); }

    .sidebar-header { padding: 60px 0 10px 0; display: flex; flex-direction: column; align-items: center; }
    .sidebar-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); background: #fff; transition: 0.3s; object-fit: cover; }
    .sidebar.expanded .sidebar-avatar { width: 90px; height: 90px; }
    .sidebar-username { margin-top: 12px; font-weight: bold; opacity: 0; transition: 0.3s; color: var(--accent); }
    .sidebar.expanded .sidebar-username { opacity: 1; }

    .nav-content { flex-grow: 1; margin-top: 20px; width: 100%; }
    .nav-item { display: flex; align-items: center; justify-content: center; padding: 15px 0; margin: 8px 10px; border-radius: 16px; cursor: pointer; transition: 0.3s; }
    .sidebar.expanded .nav-item { justify-content: flex-start; padding-left: 20px; }
    .nav-item.active { background: var(--accent); color: #000; font-weight: bold; }
    .nav-icon { font-size: 1.4rem; min-width: 40px; text-align: center; }
    .nav-text { width: 0; opacity: 0; transition: 0.2s; white-space: nowrap; overflow: hidden; }
    .sidebar.expanded .nav-text { width: auto; opacity: 1; margin-left: 10px; }

    /* Layout & Title */
    .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px 100px 120px; text-align: center; }
    .header-group h1 { font-size: 4rem; letter-spacing: -3px; margin-bottom: 10px; }
    #greeting { opacity: 0.8; margin-bottom: 50px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }

    /* Card & Delete Button */
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 28px; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; backdrop-filter: blur(10px); position: relative; }
    .card:hover { transform: translateY(-8px); border-color: var(--accent); }
    .delete-btn { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 18px; opacity: 0; transition: 0.3s; color: #ff4747; }
    .card:hover .delete-btn { opacity: 0.6; }
    .delete-btn:hover { opacity: 1 !important; transform: scale(1.2); }
    
    .btn { width: 100%; padding: 12px; background: var(--accent); color: #000; text-decoration: none; border-radius: 14px; font-weight: bold; margin-top: 15px; }
    .add-card { cursor: pointer; border: 2px dashed var(--card-border); background: transparent; min-height: 220px; }

    /* Modal & Confirm Dialog */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .modal { background: #202124; width: 450px; border-radius: 12px; padding: 24px; color: #e8eaed; text-align: left; }
    .modal label { font-size: 12px; color: #9aa0a6; display: block; margin-bottom: 5px; }
    .modal input { width: 100%; background: #303134; border: none; border-bottom: 2px solid var(--accent); padding: 12px; color: #fff; margin-bottom: 20px; outline: none; }
    .modal-btns { display: flex; justify-content: flex-end; gap: 12px; }
    .modal-btn { padding: 10px 24px; border-radius: 20px; cursor: pointer; border: 1px solid #5f6368; background: transparent; color: var(--accent); font-weight: 500; }
    .modal-btn.primary { background: #303134; border: none; color: #5f6368; }
    .modal-btn.primary.active { background: var(--accent); color: #000; }

    .confirm-box { text-align: center; }
    .confirm-box h2 { margin-bottom: 25px; color: #fff; }
    .confirm-btns { display: flex; gap: 15px; justify-content: center; }
    .btn-yes { background: #ff4747; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .btn-no { background: #5f6368; color: white; border: none; padding: 10px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }

    /* Settings section */
    .settings-section { display: none; text-align: left; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .btn-save { padding: 12px 30px; background: #3b82f6; color: white; border-radius: 50px; border: none; cursor: pointer; float: right; }
    .color-dot { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

    .theme-switch { position: fixed; bottom: 30px; right: 30px; width: 55px; height: 55px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 1.5rem; }
  </style>
</head>
<body id="body">

  <aside class="sidebar" id="sidebar">
    <button class="toggle-sidebar" id="toggleBtn"><span>❯</span></button>
    <div class="sidebar-header">
      <img id="sidebarAvatar" class="sidebar-avatar" src="https://api.dicebear.com/7.x/miniavs/svg?seed=Liam" alt="User">
      <span id="sidebarUsernameDisplay" class="sidebar-username">Ní Hào Ma</span>
    </div>
    <div class="nav-content">
      <div class="nav-item active" id="nav-dashboard" onclick="switchPage('dashboard')"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></div>
      <div class="nav-item" id="nav-settings" onclick="switchPage('settings')"><span class="nav-icon">⚙️</span><span class="nav-text">Cài đặt</span></div>
    </div>
  </aside>

  <div class="container">
    <div id="page-dashboard">
      <div class="header-group">
        <h1 id="mainTitle">AO Dashboard Q10</h1>
        <p id="greeting">Haku_Na_Matata!</p>
      </div>
      <div class="grid" id="shortcutGrid"></div>
    </div>

    <div id="page-settings" class="settings-section">
      <button class="btn-save" onclick="saveAllSettings()">💾 LƯU NÒ</button>
      <div style="clear: both; padding-top: 20px;"></div>
      <div class="grid">
        <div class="card" style="grid-column: span 2;">
          <h3>Thông Tin Của Ní</h3>
          <input type="text" id="usernameInput" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ccc; background:rgba(0,0,0,0.1); color:inherit;">
          <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn" onclick="setGender('male')">Liam</button>
            <button class="btn" onclick="setGender('female')" style="background: #ec4899;">Adrian</button>
            <button class="btn" onclick="setGender('dog')" style="background: #f59e0b;">Luis</button>
          </div>
        </div>
        <div class="card">
          <h3>Màu Chủ Đạo</h3>
          <div style="display: flex; gap: 15px; margin-top: 20px;">
            <div class="color-dot" style="background: #22c55e;" onclick="setAccent('#22c55e')"></div>
            <div class="color-dot" style="background: #3b82f6;" onclick="setAccent('#3b82f6')"></div>
            <div class="color-dot" style="background: #ef4444;" onclick="setAccent('#ef4444')"></div>
            <div class="color-dot" style="background: #a855f7;" onclick="setAccent('#a855f7')"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Thêm Lối Tắt (Căn giữa nội dung) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Thêm lối tắt</h2>
      <label>Icon (Dán Emoji từ Piliapp)</label>
      <input type="text" id="shortcutIcon" placeholder="Ví dụ: ⭐">
      <label>Tên</label>
      <input type="text" id="shortcutName" placeholder="Nhập tên...">
      <label>URL</label>
      <input type="text" id="shortcutUrl" placeholder="https://..." oninput="validateModal()">
      <div class="modal-btns">
        <button class="modal-btn" onclick="closeModal()">Huỷ</button>
        <button class="modal-btn primary" id="btnDone" onclick="addShortcut()">Xong</button>
      </div>
    </div>
  </div>

  <!-- Thông báo xác nhận xóa -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal confirm-box">
      <h2>Mày chắc chưaaa?</h2>
      <div class="confirm-btns">
        <button class="btn-yes" id="confirmDeleteBtn">CHẮC</button>
        <button class="btn-no" onclick="closeConfirm()">CHẮC chớt liền</button>
      </div>
    </div>
  </div>

  <div class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙</div>

  <script>
    let appConfig = JSON.parse(localStorage.getItem('ao_dashboard_v2')) || {
      name: "Ní Hào Ma", gender: "male", accent: "#22c55e", avatar: "https://api.dicebear.com/7.x/miniavs/svg?seed=Liam", isLightMode: false
    };

    // Danh sách 5 mục mặc định có thể xóa
    let defaultItems = JSON.parse(localStorage.getItem('default_items')) || [
      {name: "Course Key AE", url: "https://learn.eltngl.com/", icon: "🔑"},
      {name: "Học Cụ & In Ấn", url: "https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7BD651B68A-99FC-4B10-82CD-A6F475821593%7D&file=H%25u1eccC%20C%25u1ee4%20-%20NCT.xlsx", icon: "📘"},
      {name: "Hóa Đơn VAT", url: "https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7B0EF1083E-E86B-5708-397A-15B22C51A364%7D&file=Q10_HO%C3%81%20%C4%90%C6%A0N%20VAT.xlsx", icon: "🧾"},
      {name: "Kho Sách", url: "https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7B2E6C9D9F-3E1B-5A31-B9D1-530F93955649%7D&file=2026-KHO-SACH-NGUYEN-CHI-THANH.xlsx", icon: "📚"},
      {name: "Quà Tặng HS", url: "https://stemhouseeducation-my.sharepoint.com/:x:/r/personal/khangnguyen_stemhouse_edu_vn/_layouts/15/Doc.aspx?sourcedoc=%7B361EB4A0-4B6F-44F9-9AA2-0A0D08AD4B72%7D&file=2025-2026_QU%C3%80%20T%E1%BA%B6NG%20HS.xlsx", icon: "🎁"}
    ];

    let customShortcuts = JSON.parse(localStorage.getItem('user_shortcuts') || '[]');
    let pendingDelete = { type: '', index: -1 };

    function renderAll() {
      const grid = document.getElementById('shortcutGrid');
      grid.innerHTML = '';

      // Render cả mục mặc định và mục tự thêm (đều căn giữa)
      [...defaultItems.map((item, i) => ({...item, type: 'default', idx: i})), 
       ...customShortcuts.map((item, i) => ({...item, type: 'custom', idx: i}))]
      .forEach(s => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <span class="delete-btn" onclick="askDelete('${s.type}', ${s.idx})">✕</span>
          <div style="font-size: 50px; margin-bottom: 10px;">${s.icon || '🔗'}</div>
          <h3 style="font-size: 1.1rem;">${s.name}</h3>
          <a class="btn" href="${s.url}" target="_blank">Mở</a>
        `;
        grid.appendChild(card);
      });

      grid.innerHTML += `<div class="card add-card" onclick="openModal()"><div style="font-size: 60px; color: var(--accent);">+</div><p>Thêm lối tắt</p></div>`;
      applyConfig();
    }

    function askDelete(type, index) {
      pendingDelete = { type, index };
      document.getElementById('confirmOverlay').style.display = 'flex';
    }

    function closeConfirm() { document.getElementById('confirmOverlay').style.display = 'none'; }

    document.getElementById('confirmDeleteBtn').onclick = () => {
      if(pendingDelete.type === 'default') {
        defaultItems.splice(pendingDelete.index, 1);
        localStorage.setItem('default_items', JSON.stringify(defaultItems));
      } else {
        customShortcuts.splice(pendingDelete.index, 1);
        localStorage.setItem('user_shortcuts', JSON.stringify(customShortcuts));
      }
      renderAll();
      closeConfirm();
    };

    function openModal() { document.getElementById('modalOverlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    
    function validateModal() {
      const btn = document.getElementById('btnDone');
      const hasUrl = document.getElementById('shortcutUrl').value.length > 5;
      btn.classList.toggle('active', hasUrl);
      btn.disabled = !hasUrl;
    }

    function addShortcut() {
      const name = document.getElementById('shortcutName').value || "Lối tắt";
      const url = document.getElementById('shortcutUrl').value;
      const icon = document.getElementById('shortcutIcon').value || "🔗";
      customShortcuts.push({name, url, icon});
      localStorage.setItem('user_shortcuts', JSON.stringify(customShortcuts));
      renderAll(); closeModal();
    }

    function switchPage(page) {
      document.getElementById('page-dashboard').style.display = (page === 'dashboard' ? 'block' : 'none');
      document.getElementById('page-settings').style.display = (page === 'settings' ? 'block' : 'none');
      document.getElementById('nav-dashboard').classList.toggle('active', page === 'dashboard');
      document.getElementById('nav-settings').classList.toggle('active', page === 'settings');
    }

    function applyConfig() {
      document.getElementById('sidebarUsernameDisplay').innerText = appConfig.name;
      document.getElementById('usernameInput').value = appConfig.name;
      document.getElementById('sidebarAvatar').src = appConfig.avatar;
      document.documentElement.style.setProperty('--accent', appConfig.accent);
      document.body.classList.toggle('light-mode', appConfig.isLightMode);
      document.getElementById('themeBtn').innerText = appConfig.isLightMode ? "☀️" : "🌙";
      const h = new Date().getHours();
      document.getElementById('greeting').innerText = `${h < 12 ? "OẮT SẤP BRO ĐỜ" : "GÒI MÀY LÀM CHƯA"}, ${appConfig.name}! 🚀`;
    }

    function toggleTheme() { appConfig.isLightMode = !appConfig.isLightMode; saveConfig(); }
    function setAccent(c) { appConfig.accent = c; saveConfig(); }
    function setGender(g) { 
      appConfig.gender = g; 
      appConfig.avatar = `https://api.dicebear.com/7.x/miniavs/svg?seed=${g === 'male' ? 'Liam' : g === 'female' ? 'Adrian' : 'Luis'}`;
      saveConfig(); 
    }
    function saveAllSettings() { appConfig.name = document.getElementById('usernameInput').value; saveConfig(); alert("Đã lưu!"); }
    function saveConfig() { localStorage.setItem('ao_dashboard_v2', JSON.stringify(appConfig)); applyConfig(); }

    document.getElementById('toggleBtn').onclick = () => document.getElementById('sidebar').classList.toggle('expanded');
    window.onload = renderAll;
  </script>
</body>
</html>
