<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Pro Edition</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0f0720; 
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.2); 
      --text-main: #ffffff;
      --accent: #22c55e; 
      --liam-blue: #3b82f6; 
      --sidebar-width: 260px; 
      --sidebar-collapsed-width: 80px;
    }

    body.light-mode {
      --bg-color: #f8fafc; 
      --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.1); 
      --text-main: #1e293b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "Noto Color Emoji", sans-serif; transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.3s; }

    body {
      background: var(--bg-color);
      /* Màu tím đặc trưng ní yêu cầu */
      background-image: radial-gradient(circle at 50% -20%, #4c1d95, #1e1045, #0f0720);
      background-attachment: fixed; color: var(--text-main); min-height: 100vh; overflow-x: hidden;
    }
    body.light-mode { background-image: radial-gradient(circle at 50% -20%, #e2e8f0, #f8fafc); }

    /* ====== SIDEBAR ====== */
    .sidebar {
      position: fixed; top: 20px; left: 20px; bottom: 20px;
      width: var(--sidebar-collapsed-width); background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px); border: 1px solid var(--card-border);
      border-radius: 24px; z-index: 2000; transition: width 0.4s; display: flex; flex-direction: column;
    }
    .sidebar.expanded { width: var(--sidebar-width); border-color: var(--accent); }

    .toggle-sidebar {
      position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
      background: var(--accent); border: 2px solid #000; color: #000;
      width: 50px; height: 22px; border-radius: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }

    .sidebar-header { padding: 60px 0 10px 0; display: flex; flex-direction: column; align-items: center; }
    .sidebar-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); background: #fff; }
    .sidebar.expanded .sidebar-avatar { width: 90px; height: 90px; }

    .nav-content { flex-grow: 1; margin-top: 20px; width: 100%; }
    
    /* Style cho mục Menu */
    .nav-item { 
      display: flex; align-items: center; justify-content: center; 
      padding: 15px 0; margin: 8px 10px; border-radius: 16px; 
      cursor: pointer; transition: 0.3s; color: var(--text-main);
    }
    .sidebar.expanded .nav-item { justify-content: flex-start; padding-left: 20px; }

    /* Hiệu ứng Sáng Xanh khi được chọn (Active) */
    .nav-item.active { 
      background: var(--accent) !important; 
      color: #000 !important; 
      font-weight: bold; 
      box-shadow: 0 0 15px var(--accent); 
    }
    
    .nav-text { width: 0; opacity: 0; visibility: hidden; transition: 0.2s; margin-left: 10px; }
    .sidebar.expanded .nav-text { width: auto; opacity: 1; visibility: visible; }

    /* ====== LAYOUT & CARDS ====== */
    .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px 100px 120px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }

    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 28px; padding: 30px; backdrop-filter: blur(10px);
      display: flex; flex-direction: column; align-items: center;
    }
    .card:hover { box-shadow: 0 0 12px var(--accent); transform: translateY(-5px); }

    .btn { width: 100%; padding: 12px; background: var(--accent); color: #000; border-radius: 14px; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; }
    .btn-save-fixed { position: fixed; top: 30px; right: 30px; padding: 12px 25px; background: #22c55e; color: #fff; border-radius: 12px; border: none; cursor: pointer; z-index: 100; font-weight: bold; }

    /* Ẩn các trang mặc định */
    .page-section { display: none; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body id="body">

  <aside class="sidebar" id="sidebar">
    <button class="toggle-sidebar" id="toggleBtn"><span>❯</span></button>
    <div class="sidebar-header">
      <img id="sidebarAvatar" class="sidebar-avatar" src="https://api.dicebear.com/7.x/miniavs/svg?seed=Liam" alt="User">
    </div>
    
    <div class="nav-content">
      <!-- Thêm 'this' vào hàm switchPage để nó biết ní đang bấm vào đâu -->
      <div class="nav-item active" onclick="switchPage('dashboard', this)">
        <span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span>
      </div>
      <div class="nav-item" onclick="switchPage('settings', this)">
        <span class="nav-icon">⚙️</span><span class="nav-text">Cài đặt</span>
      </div>
      <!-- Ví dụ mục tương lai: Chỉ cần copy dòng dưới và tạo div page-tuonglai là xong -->
      <!-- <div class="nav-item" onclick="switchPage('tuonglai', this)"><span class="nav-icon">🚀</span><span class="nav-text">Mục mới</span></div> -->
    </div>
  </aside>

  <div class="container">
    <!-- TRANG DASHBOARD -->
    <div id="page-dashboard" class="page-section" style="display: block;">
      <div style="text-align: center; margin-bottom: 40px;">
        <h1>AO Dashboard Q10</h1>
        <p>Haku_Na_Matata!</p>
      </div>
      <div class="grid" id="shortcutGrid">
        <div class="card"><h3>Lối tắt 1</h3><button class="btn">Mở</button></div>
      </div>
    </div>

    <!-- TRANG CÀI ĐẶT -->
    <div id="page-settings" class="page-section">
      <button class="btn-save-fixed" onclick="alert('Đã lưu!')">💾 LƯU THAY ĐỔI</button>
      <h1 style="text-align: center; margin-bottom: 40px;">Cài đặt</h1>
      <div class="card" style="max-width: 500px; margin: 0 auto;">
        <p>Cấu hình giao diện tại đây...</p>
      </div>
    </div>
    
    <!-- TRANG TƯƠNG LAI (NẾU CÓ) -->
    <div id="page-tuonglai" class="page-section">
        <h1>Mục mới trong tương lai</h1>
    </div>
  </div>

  <script>
    /**
     * Hàm chuyển trang thông minh
     * @param {string} pageId - ID của trang (không bao gồm chữ 'page-')
     * @param {HTMLElement} element - Phần tử menu được bấm (truyền vào bằng 'this')
     */
    function switchPage(pageId, element) {
      // 1. Xử lý ẩn/hiện nội dung trang
      const allPages = document.querySelectorAll('.page-section');
      allPages.forEach(page => page.style.display = 'none');
      
      const targetPage = document.getElementById(`page-${pageId}`);
      if (targetPage) {
        targetPage.style.display = 'block';
      }

      // 2. Xử lý trạng thái Sáng Xanh (Active) trên Sidebar
      // Tìm tất cả các mục menu và gỡ lớp 'active'
      const allNavItems = document.querySelectorAll('.nav-item');
      allNavItems.forEach(item => item.classList.remove('active'));

      // Thêm lớp 'active' vào đúng mục vừa được bấm
      if (element) {
        element.classList.add('active');
      }
    }

    // Toggle Sidebar mở rộng/thu nhỏ
    document.getElementById('toggleBtn').onclick = () => {
      document.getElementById('sidebar').classList.toggle('expanded');
    };
  </script>
</body>
</html>
