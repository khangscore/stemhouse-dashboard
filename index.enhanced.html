<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Enhanced Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">

  <style>
    /* --- THEME: brighter purple + animated background --- */
    :root {
      --bg-color: #0f0720;
      --card-bg: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.2);
      --text-main: #ffffff;
      --accent: #8b5cf6;          /* MÀU CHỦ ĐẠO mới (tím sáng hơn) */
      --accent-dark: #6d28d9;
      --liam-blue: #3b82f6;
      --sidebar-width: 260px;
      --sidebar-collapsed-width: 80px;
      --shadow-accent: 0 0 24px rgba(139,92,246,0.32);
    }

    body.light-mode { --bg-color: #f8fafc; --card-bg: rgba(0,0,0,0.05); --card-border: rgba(0,0,0,0.1); --text-main: #1e293b; }

    *{ margin:0; padding:0; box-sizing:border-box; font-family: "Segoe UI", "Noto Color Emoji", sans-serif; }

    body::before{
      content:'';
      position:fixed; inset:0; z-index:-1;
      background:
        radial-gradient(600px 400px at 10% 20%, rgba(139,92,246,0.12), transparent 12%),
        radial-gradient(500px 300px at 85% 80%, rgba(59,130,246,0.06), transparent 12%),
        radial-gradient(380px 250px at 50% -10%, rgba(139,92,246,0.14), transparent 10%);
      filter: blur(28px) saturate(1.05);
      animation: bgMove 16s linear infinite alternate;
      pointer-events:none;
    }
    @keyframes bgMove{0%{transform:translate3d(0,0,0) scale(1);opacity:.95}50%{transform:translate3d(-6%,4%,0) scale(1.02);opacity:1}100%{transform:translate3d(6%,-4%,0) scale(1);opacity:.96}}

    body{ background:var(--bg-color); color:var(--text-main); min-height:100vh; overflow-x:hidden; background-image: radial-gradient(circle at 50% -20%, color-mix(in srgb, var(--accent) 45%, #4c1d95), #1e1045 55%, var(--bg-color)); }

    /* SIDEBAR */
    .sidebar{ position:fixed; top:20px; left:10px; bottom:20px; width:var(--sidebar-collapsed-width); background:rgba(255,255,255,0.03); backdrop-filter: blur(18px); border-radius:24px; display:flex; flex-direction:column; padding-bottom:16px; border:6px solid rgba(255,255,255,0.03); transition:width .32s cubic-bezier(.2,1,.36,1), box-shadow .28s, border-color .28s; z-index:2000; }
    .sidebar:not(:hover){ box-shadow:0 6px 30px rgba(0,0,0,0.35), 0 0 0 6px color-mix(in srgb, var(--accent) 18%, transparent); border-color: color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,0.02)); }
    .sidebar:hover{ width:var(--sidebar-width); border-color:var(--accent); box-shadow:0 12px 40px rgba(13,8,30,0.6), 0 0 0 8px color-mix(in srgb, var(--accent) 18%, transparent); }
    .toggle-sidebar{ display:none !important; }

    .sidebar-header{ padding:16px; height:86px; display:flex; align-items:center; gap:10px; justify-content:center; position:relative; }
    .sidebar-avatar{ width:45px; height:45px; border-radius:50%; border:2px solid var(--accent); background:#fff; display:flex; align-items:center; justify-content:center; font-size:1.4rem; transition: transform .28s cubic-bezier(.2,1,.36,1), box-shadow .28s; transform-origin:center; }
    .sidebar:hover .sidebar-avatar{ transform:scale(1.9); box-shadow: 0 8px 30px rgba(0,0,0,0.35), 0 0 30px color-mix(in srgb, var(--accent) 22%, transparent); }
    .sidebar-username{ margin-left:8px; font-weight:800; color:var(--accent); opacity:0; transform:translateX(-6px); transition:opacity .22s ease, transform .28s ease; white-space:nowrap; display:inline-block; }
    .sidebar:hover .sidebar-username{ opacity:1; transform:translateX(0); }

    .nav-content{ flex:1; margin-top:8px; padding:8px 10px 18px; display:flex; flex-direction:column; gap:8px; }
    .nav-item{ min-height:56px; height:56px; display:flex; align-items:center; justify-content:center; padding:0 14px; border-radius:16px; cursor:pointer; color:inherit; gap:12px; transition: transform .22s cubic-bezier(.2,1,.36,1), box-shadow .28s, background .18s; will-change:transform,box-shadow; }
    .nav-item:hover{ transform:translateY(-12px) scale(1.03); box-shadow:0 18px 50px rgba(11,8,30,0.6), 0 0 32px color-mix(in srgb, var(--accent) 22%, transparent); background:linear-gradient(180deg, color-mix(in srgb, var(--accent) 14%, rgba(255,255,255,0.02)), rgba(255,255,255,0.02)); border-color: color-mix(in srgb, var(--accent) 28%, rgba(255,255,255,0.06)); color:#fff; }
    .sidebar:not(:hover) .nav-item{ justify-content:center; padding:0; }
    .nav-text{ flex:1; opacity:0; visibility:hidden; transform:translateX(-6px); transition:all .28s; }
    .sidebar:hover .nav-text{ opacity:1; visibility:visible; transform:translateX(0); }
    .nav-item.active{ background:var(--accent); color:#000; box-shadow:var(--shadow-accent); transform:translateY(-6px); }

    .sidebar .sidebar-footer{ margin-top:auto; padding:12px; display:flex; align-items:center; justify-content:center; }
    .logout-btn{ width:calc(100% - 24px); border-radius:14px; padding:10px 12px; background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 78%, #fff), var(--accent)); color:#000; font-weight:800; cursor:pointer; border:none; box-shadow:0 8px 28px rgba(0,0,0,0.35); transition:transform .12s ease; }
    .logout-btn:active{ transform:translateY(1px) scale(.995); }

    /* MAIN LAYOUT */
    .container{ max-width:1200px; margin:0 auto; padding:60px 20px 100px 120px; position:relative; }
    .header-group{ text-align:center; margin-bottom:20px; }
    h1{ font-size:2.2rem; }

    /* Calendar / Excel minimal styles */
    .card{ background:var(--card-bg); border:1px solid var(--card-border); border-radius:20px; padding:18px; color:var(--text-main); }

    .calendar-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:10px; }
    .calendar-cell{ background:rgba(255,255,255,0.03); padding:8px; border-radius:12px; min-height:100px; display:flex; flex-direction:column; }
    .calendar-cell textarea{ margin-top:8px; width:100%; resize:none; background:transparent; border:1px solid rgba(255,255,255,0.04); color:inherit; border-radius:8px; padding:6px; }

    /* Excel scaffold */
    .excel-wrap{ width:100%; display:flex; flex-direction:column; gap:12px; }
    .excel-toolbar{ display:flex; justify-content:space-between; align-items:center; gap:8px; }
    .excel-cell{ border:1px solid rgba(255,255,255,0.04); padding:6px; min-width:96px; white-space:nowrap; }
    .excel-cell.highlighted{ box-shadow:0 0 0 3px var(--accent); border-color:var(--accent); }

    /* modal tweak */
    .modal-actions{ justify-content:center !important; display:flex; gap:12px; }
    .modal-actions button{ min-width:140px; padding:12px 18px; border-radius:12px; box-shadow:0 10px 28px rgba(0,0,0,0.26); transition:transform .12s ease; }
    .modal-actions button:active{ transform:translateY(1px); box-shadow:0 6px 14px rgba(0,0,0,0.18); }

    @media(max-width:900px){ .container{ padding-left:20px; } .sidebar{ left:6px; } }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" aria-label="Sidebar">
    <div class="sidebar-header">
      <div class="sidebar-avatar" id="login-icon">🤪</div>
      <div class="sidebar-username">Khang</div>
    </div>
    <nav class="nav-content" role="navigation">
      <div class="nav-item active"><span class="nav-icon">🏠</span><div class="nav-text">Home</div></div>
      <div class="nav-item"><span class="nav-icon">📊</span><div class="nav-text">Dashboard</div></div>
      <div class="nav-item"><span class="nav-icon">📁</span><div class="nav-text">Excel trắng</div></div>
      <div class="nav-item"><span class="nav-icon">⚙️</span><div class="nav-text">Cài đặt</div></div>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" id="logoutBtn">Đăng xuất</button></div>
  </aside>

  <main class="container">
    <div class="header-group"><h1>AO Dashboard — Phiên bản nâng cấp (Demo)</h1></div>

    <section style="display:grid;grid-template-columns:1fr 420px;gap:22px;">
      <div class="card">
        <h3 style="margin-bottom:8px">Lịch (mở rộng)</h3>
        <div id="vietnamCalendar"></div>
      </div>

      <div class="card">
        <h3 style="margin-bottom:8px">Excel trắng (demo)</h3>
        <div class="excel-wrap" id="excelDemo">
          <div class="excel-toolbar">
            <div><button class="btn">File</button> <button class="btn">Lưu</button></div>
            <div><input id="cellName" type="text" placeholder="A1" style="padding:6px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit"></div>
          </div>
          <div style="display:flex;gap:8px;overflow:auto;">
            <div id="sheet-left" style="flex:0 0 56px;border-right:1px solid rgba(255,255,255,0.04);">
            </div>
            <div id="sheet-grid" style="overflow:auto;flex:1;">
              <div id="sheet-table" style="display:table;border-collapse:collapse;"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- Confirm modal -->
  <div class="modal-overlay" id="confirmOverlay" style="display:none;align-items:center;justify-content:center;">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-title" id="confirmTitle">Mày chắc chưa 🙄 ??</div>
      <p style="color:#cbd5e1;margin-bottom:18px;">Chọn một trong hai: <strong>Chắc</strong> (tương ứng Không) hoặc <strong>Chắc chết liền</strong> (tương ứng Có)</p>
      <div class="modal-actions">
        <button class="btn-cancel" id="confirmNo">Chắc</button>
        <button class="btn-confirm" id="confirmYes">Chắc chết liền</button>
      </div>
    </div>
  </div>

  <script>
  // --- Sidebar: Logout modal ---
  const logoutBtn = document.getElementById('logoutBtn');
  const confirmOverlay = document.getElementById('confirmOverlay');
  const confirmNo = document.getElementById('confirmNo');
  const confirmYes = document.getElementById('confirmYes');

  if(logoutBtn){ logoutBtn.addEventListener('click', ()=> { confirmOverlay.style.display = 'flex'; }); }
  if(confirmNo){ confirmNo.addEventListener('click', ()=> { confirmOverlay.style.display = 'none'; }); }
  if(confirmYes){ confirmYes.addEventListener('click', ()=> { window.location.href = './login.html'; }); }
  confirmOverlay.addEventListener('click', (e) => { if(e.target === confirmOverlay) confirmOverlay.style.display = 'none'; });

  // ensure login icon emoji
  (function setLoginIcon(){ const sel = document.getElementById('login-icon'); if(sel){ sel.textContent = '🤪'; sel.style.fontSize='1.4rem'; } })();

  // --- Background picker (pencil) omitted in demo; basic drag-drop support for dominant color extraction ---
  (function dragDropPalette(){
    function loadImage(src){ return new Promise((res,rej)=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }
    function getDominantColor(img){ const c=document.createElement('canvas'); const w=64,h=64; c.width=w;c.height=h; const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h); const d=ctx.getImageData(0,0,w,h).data; let r=0,g=0,b=0,count=0; for(let i=0;i<d.length;i+=4){ const a=d[i+3]; if(a<125) continue; r+=d[i]; g+=d[i+1]; b+=d[i+2]; count++; } if(!count) return getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(); r=Math.round(r/count); g=Math.round(g/count); b=Math.round(b/count); return `rgb(${r}, ${g}, ${b})`; }
    document.body.addEventListener('drop', async (e)=>{ e.preventDefault(); const f=(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]); if(f && f.type && f.type.startsWith('image/')){ const url = URL.createObjectURL(f); try{ const img = await loadImage(url); const color = getDominantColor(img); document.documentElement.style.setProperty('--accent', color); document.documentElement.style.setProperty('--accent-dark', color); }catch(err){ console.warn(err); } } });
    ['dragenter','dragover'].forEach(ev=>document.body.addEventListener(ev,e=>e.preventDefault()));
  })();

  // --- Excel scaffold ---
  (function buildBasicSheet(){
    const container = document.getElementById('excelDemo'); if(!container) return;
    const left = container.querySelector('#sheet-left');
    const tableWrap = container.querySelector('#sheet-table');
    const rows = 40, cols = 12;
    // header row
    const headerRow = document.createElement('div'); headerRow.style.display='table-row';
    const spacer = document.createElement('div'); spacer.style.display='table-cell'; spacer.style.width='56px'; spacer.style.height='32px'; headerRow.appendChild(spacer);
    for(let c=0;c<cols;c++){ const cell=document.createElement('div'); cell.style.display='table-cell'; cell.style.padding='6px'; cell.style.minWidth='96px'; cell.style.border='1px solid rgba(255,255,255,0.04)'; cell.style.fontWeight='800'; cell.style.background='rgba(255,255,255,0.02)'; cell.textContent = String.fromCharCode(65 + (c % 26)) + (c>=26?Math.floor(c/26):''); headerRow.appendChild(cell); }
    tableWrap.appendChild(headerRow);
    for(let r=1;r<=rows;r++){
      const rowNum=document.createElement('div'); rowNum.style.height='32px'; rowNum.style.display='flex'; rowNum.style.alignItems='center'; rowNum.style.justifyContent='center'; rowNum.style.borderTop='1px solid rgba(255,255,255,0.04)'; rowNum.textContent=r; left.appendChild(rowNum);
      const row = document.createElement('div'); row.style.display='table-row'; const rowSpacer=document.createElement('div'); rowSpacer.style.display='table-cell'; rowSpacer.style.height='32px'; row.appendChild(rowSpacer);
      for(let c=0;c<cols;c++){ const cell=document.createElement('div'); cell.contentEditable=true; cell.className='excel-cell'; cell.style.display='table-cell'; cell.style.padding='6px'; cell.style.minWidth='96px'; cell.style.border='1px solid rgba(255,255,255,0.04)'; cell.style.background='transparent'; row.appendChild(cell); }
      tableWrap.appendChild(row);
    }
    // simple click highlight
    document.addEventListener('pointerdown', (e)=>{ const t=e.target; if(t.classList && t.classList.contains('excel-cell')){ document.querySelectorAll('.excel-cell.highlighted').forEach(el=>{ el.classList.remove('highlighted'); el.style.boxShadow=''; el.style.borderColor=''; }); t.classList.add('highlighted'); const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(); t.style.boxShadow = `0 0 0 3px ${accent}`; t.style.borderColor = accent; } });
  })();

  // --- Calendar scaffold ---
  (function renderCalendarScaffold(){
    const container = document.getElementById('vietnamCalendar'); if(!container) return;
    const today = new Date(); const year = today.getFullYear(); const month = today.getMonth();
    container.innerHTML = '';
    const head = document.createElement('div'); head.className='calendar-head'; head.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:1.1rem">Lịch ${year}-${month+1}</strong><div class="calendar-controls"><button class="calendar-nav-btn" id="prevM">&lt;</button><button class="calendar-nav-btn" id="nextM">&gt;</button></div></div>`;
    container.appendChild(head);
    const grid = document.createElement('div'); grid.className='calendar-grid'; grid.style.gridTemplateColumns='repeat(7,1fr)'; grid.style.gap='8px';
    const weekdays=['CN','T2','T3','T4','T5','T6','T7']; weekdays.forEach(d=>{ const el=document.createElement('div'); el.className='calendar-cell weekday'; el.textContent=d; grid.appendChild(el); });
    const first=new Date(year,month,1); const start = first.getDay(); const days = new Date(year, month+1, 0).getDate();
    for(let i=0;i<start;i++){ const e=document.createElement('div'); e.className='calendar-cell empty'; grid.appendChild(e); }
    for(let d=1;d<=days;d++){ const e=document.createElement('div'); e.className='calendar-cell'; e.style.padding='8px'; const duong=document.createElement('div'); duong.textContent=d; duong.style.fontWeight='800'; duong.style.fontSize='1.05rem'; const am=document.createElement('div'); am.textContent = getLunarPlaceholder(year, month+1, d); am.style.fontSize='0.7rem'; am.style.opacity='0.85'; am.style.marginTop='4px'; const hol=document.createElement('div'); hol.style.fontSize='0.75rem'; hol.style.color='var(--accent)'; hol.style.marginTop='6px'; const holidayName = getHolidayName(year, month+1, d); if(holidayName) hol.textContent = holidayName; const note=document.createElement('textarea'); note.placeholder='Ghi chú...'; note.className='integrated-note'; note.style.height='54px'; note.style.marginTop='6px'; note.style.width='100%'; note.style.border='1px solid rgba(255,255,255,0.04)'; note.style.background='transparent'; note.style.color='inherit'; note.style.resize='none'; e.appendChild(duong); e.appendChild(am); if(holidayName) e.appendChild(hol); e.appendChild(note); grid.appendChild(e); }
    container.appendChild(grid);
    document.getElementById('prevM').addEventListener('click', ()=> alert('Chức năng đổi tháng sẽ được cập nhật.'));
    document.getElementById('nextM').addEventListener('click', ()=> alert('Chức năng đổi tháng sẽ được cập nhật.'));
  })();
  function getLunarPlaceholder(y,m,d){ const day = d % 30 || 30; return `Âm ${day}`; }
  function getHolidayName(yr, mo, day){ const k = `${yr}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`; const holidays = { [`${yr}-01-01`]: 'Tết Dương lịch', [`${yr}-04-30`]: 'Ngày Giải phóng', [`${yr}-05-01`]: 'Quốc tế Lao động', [`${yr}-09-02`]: 'Quốc khánh' }; return holidays[k] || ''; }
  </script>

</body>
</html>
