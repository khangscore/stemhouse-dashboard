<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Gamer Station Fix</title>
  
  <style>
    :root {
      --bg-color: #0f0720; 
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.2); 
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --accent: #22c55e;
      --sidebar-width: 280px;
      --sidebar-collapsed-width: 85px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }

    body {
      background: var(--bg-color);
      background-image: radial-gradient(circle at top right, #1e0b45, #0f0720);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 20px; left: 20px; bottom: 20px;
      width: var(--sidebar-collapsed-width);
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      z-index: 2000;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
    }
    .sidebar.expanded { width: var(--sidebar-width); border-color: var(--accent); }

    .toggle-sidebar {
      background: var(--accent); border: 2px solid #000; color: white;
      width: 30px; height: 30px; border-radius: 8px;
      cursor: pointer; position: absolute; right: -15px; top: 40px; 
      transition: 0.3s; z-index: 2001;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar.expanded .toggle-sidebar { transform: rotate(180deg); }

    .nav-item {
      display: flex; align-items: center; padding: 15px 25px; margin: 10px;
      text-decoration: none; color: var(--text-main); border-radius: 15px;
      transition: 0.3s; overflow: hidden; white-space: nowrap; cursor: pointer;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
    .nav-item.active { background: var(--accent); color: #000; font-weight: bold; }
    
    .nav-icon { font-size: 1.4rem; min-width: 35px; }
    .nav-text { opacity: 0; transition: 0.3s; margin-left: 10px; }
    .sidebar.expanded .nav-text { opacity: 1; }

    /* Overlay */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); z-index: 1500;
      opacity: 0; pointer-events: none; transition: 0.4s;
    }
    .sidebar.expanded ~ .overlay { opacity: 1; pointer-events: auto; }

    /* Content */
    .container {
      max-width: 1000px; margin: 0 auto;
      padding: 60px 20px 100px 100px;
    }

    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 3rem; letter-spacing: -1px; margin-bottom: 10px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

    .card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: 24px; padding: 35px 25px;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      transition: 0.3s;
    }
    .card:hover { transform: translateY(-8px); border-color: var(--accent); background: rgba(255, 255, 255, 0.1); }

    .btn {
      width: 100%; padding: 12px; background: var(--accent); color: #000;
      text-decoration: none; border-radius: 12px; font-weight: bold;
      border: none; cursor: pointer; transition: 0.2s; display: inline-block;
    }
    .btn:hover { filter: brightness(1.2); }

    .settings-section { display: none; animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .avatar-circle {
      width: 100px; height: 100px; border-radius: 50%;
      border: 4px solid var(--accent); background: #fff; margin-bottom: 15px;
    }

    .color-dot {
      width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
      border: 2px solid #fff; transition: 0.2s;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <button class="toggle-sidebar" id="toggleBtn">❯</button>
    <div style="padding: 30px 25px; font-weight: 900; color: var(--accent); height: 80px;">SH10</div>
    <nav>
      <div class="nav-item active" id="nav-dashboard">
        <span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span>
      </div>
      <div class="nav-item" id="nav-settings">
        <span class="nav-icon">⚙️</span><span class="nav-text">Cài đặt</span>
      </div>
    </nav>
  </aside>

  <div class="overlay" id="overlay"></div>

  <div class="container">
    <!-- TRANG DASHBOARD -->
    <div id="page-dashboard">
      <div class="header">
        <h1>AO Dashboard Q10</h1>
        <p id="greeting" style="color: var(--text-muted);">Chào mừng trở lại!</p>
      </div>

      <div class="grid">
        <div class="card s-hover">
          <div style="font-size: 50px;">📘</div>
          <h3 style="margin: 15px 0;">Học Cụ & In Ấn</h3>
          <p style="margin-bottom: 20px;">Quản lý vật tư điều phối.</p>
          <a class="btn s-hover" href="#">Mở file</a>
        </div>
        <div class="card s-hover">
          <div style="font-size: 50px;">🧾</div>
          <h3 style="margin: 15px 0;">Hóa Đơn VAT</h3>
          <p style="margin-bottom: 20px;">Theo dõi tài chính.</p>
          <a class="btn s-hover" href="#">Mở file</a>
        </div>
        <div class="card s-hover">
          <div style="font-size: 50px;">📚</div>
          <h3 style="margin: 15px 0;">Kho Sách</h3>
          <p style="margin-bottom: 20px;">Kiểm kê tồn kho.</p>
          <a class="btn s-hover" href="#">Mở file</a>
        </div>
        <div class="card s-hover">
          <div style="font-size: 50px;">🎁</div>
          <h3 style="margin: 15px 0;">Quà Tặng HS</h3>
          <p style="margin-bottom: 20px;">Phân bổ quà tặng.</p>
          <a class="btn s-hover" href="#">Mở file</a>
        </div>
      </div>
    </div>

    <!-- TRANG CÀI ĐẶT -->
    <div id="page-settings" class="settings-section">
      <h1 style="margin-bottom: 40px;">Cài Đặt Hệ Thống</h1>
      <div class="grid">
        <div class="card">
          <img id="userAvatar" class="avatar-circle" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
          <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn s-hover" id="btn-male">Nam</button>
            <button class="btn s-hover" id="btn-female" style="background: #ec4899;">Nữ</button>
          </div>
        </div>
        <div class="card">
          <h3>Màu Năng Lượng</h3>
          <div style="display: flex; gap: 15px; margin-top: 20px;">
            <div class="color-dot s-hover" style="background: #22c55e;" id="color-green"></div>
            <div class="color-dot s-hover" style="background: #3b82f6;" id="color-blue"></div>
            <div class="color-dot s-hover" style="background: #ef4444;" id="color-red"></div>
            <div class="color-dot s-hover" style="background: #a855f7;" id="color-purple"></div>
          </div>
        </div>
        <div class="card">
          <h3>Âm Thanh Nền</h3>
          <button class="btn s-hover" id="bgSoundBtn">BẬT AMBIENT</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Elements
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleBtn');
    const overlay = document.getElementById('overlay');
    const navDashboard = document.getElementById('nav-dashboard');
    const navSettings = document.getElementById('nav-settings');
    const pageDashboard = document.getElementById('page-dashboard');
    const pageSettings = document.getElementById('page-settings');
    
    // Audio Variables
    let audioCtx, ambientOsc, ambientGain;
    let isAmbientPlaying = false;

    // --- Audio System ---
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playUI(freq, vol = 0.2, dur = 0.1) {
      initAudio();
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    function toggleAmbient() {
      initAudio();
      const btn = document.getElementById('bgSoundBtn');
      if (!isAmbientPlaying) {
        ambientOsc = audioCtx.createOscillator();
        ambientGain = audioCtx.createGain();
        ambientOsc.type = 'triangle';
        ambientOsc.frequency.setValueAtTime(55, audioCtx.currentTime);
        ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
        ambientGain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 2); // Đã tăng âm lượng nền
        ambientOsc.connect(ambientGain);
        ambientGain.connect(audioCtx.destination);
        ambientOsc.start();
        btn.innerText = "TẮT AMBIENT";
        isAmbientPlaying = true;
      } else {
        ambientGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
        setTimeout(() => { if(ambientOsc) ambientOsc.stop(); }, 1000);
        btn.innerText = "BẬT AMBIENT";
        isAmbientPlaying = false;
      }
    }

    // --- Sidebar & Navigation Logic ---
    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('expanded');
      playUI(600, 0.15);
    });

    overlay.addEventListener('click', () => {
      sidebar.classList.remove('expanded');
    });

    function switchPage(page) {
      if(page === 'dashboard') {
        pageDashboard.style.display = 'block';
        pageSettings.style.display = 'none';
        navDashboard.classList.add('active');
        navSettings.classList.remove('active');
      } else {
        pageDashboard.style.display = 'none';
        pageSettings.style.display = 'block';
        navDashboard.classList.remove('active');
        navSettings.classList.add('active');
      }
      sidebar.classList.remove('expanded'); // Đóng sidebar khi chọn xong
      playUI(1000, 0.2);
    }

    navDashboard.addEventListener('click', () => switchPage('dashboard'));
    navSettings.addEventListener('click', () => switchPage('settings'));

    // --- Settings Functions ---
    document.getElementById('btn-male').onclick = () => {
      document.getElementById('userAvatar').src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix";
      playUI(1200, 0.2);
    };
    document.getElementById('btn-female').onclick = () => {
      document.getElementById('userAvatar').src = "https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka";
      playUI(1200, 0.2);
    };

    const colors = { green: '#22c55e', blue: '#3b82f6', red: '#ef4444', purple: '#a855f7' };
    Object.keys(colors).forEach(c => {
      document.getElementById(`color-${c}`).onclick = () => {
        document.documentElement.style.setProperty('--accent', colors[c]);
        playUI(800, 0.2);
      };
    });

    document.getElementById('bgSoundBtn').onclick = toggleAmbient;

    // --- Hover Effects ---
    function applyHover() {
      const items = document.querySelectorAll('.s-hover, .nav-item, .btn, .color-dot, .toggle-sidebar');
      items.forEach(el => {
        el.onmouseenter = () => playUI(850, 0.05, 0.05); // Tiếng rê chuột (Hover)
      });
    }

    // Initialize
    window.onload = () => {
      applyHover();
      const h = new Date().getHours();
      document.getElementById('greeting').innerText = h < 12 ? "Good Morning, Commander! ☀️" : "Sẵn sàng làm việc, Gamer? 🚀";
    };
  </script>
</body>
</html>
