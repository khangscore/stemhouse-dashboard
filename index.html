<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Stemhouse Q10</title>
  
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22black%22/><circle cx=%2250%22 cy=%2250%22 r=%2243%22 fill=%22%23FFD133%22/><circle cx=%2232%22 cy=%2238%22 r=%2214%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><circle cx=%2232%22 cy=%2238%22 r=%225%22 fill=%22black%22/><circle cx=%2268%22 cy=%2230%22 r=%2210%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><circle cx=%2268%22 cy=%2230%22 r=%224%22 fill=%22black%22/><path d=%22M 25 55 L 75 55 Q 75 80 50 80 Q 25 80 25 55 Z%22 fill=%22white%22 stroke=%22black%22 stroke-width=%222%22/><path d=%22M 40 55 Q 50 85 70 70 L 60 55 Z%22 fill=%22%23FF4747%22 stroke=%22black%22 stroke-width=%221.5%22/><rect x=%2227%22 y=%2255%22 width=%2246%22 height=%226%22 fill=%22white%22/></svg>">

  <style>
    :root {
      --bg-color: #2e1065; 
      --card-bg: rgba(255, 255, 255, 0.1);
      --card-border: rgba(255, 255, 255, 0.8); 
      --text-main: #ffffff;
      --text-muted: #cbd5e1;
      --accent: #22c55e;
      --sidebar-width: 240px;
      --sidebar-collapsed-width: 85px;
    }

    body.light-mode {
      --bg-color: #f1f5f9; 
      --card-bg: rgba(255, 255, 255, 0.4);
      --card-border: #000000;
      --text-main: #0f172a;
      --text-muted: #475569;
    }

    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s ease;
    }

    /* === Sidebar Styles === */
    .sidebar {
      position: fixed; top: 20px; left: 20px; bottom: 20px;
      width: var(--sidebar-width);
      background: var(--card-bg);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 2.5px solid var(--card-border);
      border-radius: 28px;
      z-index: 1000;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column;
      overflow: hidden; /* Cực kỳ quan trọng để giấu chữ */
    }

    .sidebar.collapsed { width: var(--sidebar-collapsed-width); }

    .toggle-sidebar {
      background: var(--accent); border: 2.5px solid #000; color: white;
      width: 32px; height: 32px; border-radius: 10px;
      cursor: pointer; box-shadow: 3px 3px 0px #000;
      display: flex; align-items: center; justify-content: center;
      position: absolute; right: 15px; top: 25px; z-index: 10;
      transition: transform 0.4s ease;
    }
    .sidebar.collapsed .toggle-sidebar { transform: rotate(180deg); right: 26px; }

    .sidebar-nav { flex-grow: 1; padding: 80px 10px 10px; }

    .nav-item {
      display: flex; align-items: center; padding: 15px; margin-bottom: 10px;
      text-decoration: none; color: var(--text-main); border-radius: 18px;
      transition: background 0.3s, transform 0.2s;
      white-space: nowrap;
    }
    .nav-item:hover { background: rgba(255, 255, 255, 0.15); }
    
    .nav-icon { font-size: 1.6rem; min-width: 60px; display: flex; justify-content: center; }

    .nav-text {
      font-weight: 600;
      opacity: 1;
      transition: opacity 0.3s ease;
    }
    /* Ẩn chữ khi sidebar thu nhỏ */
    .sidebar.collapsed .nav-text { opacity: 0; pointer-events: none; }

    /* === Main Content === */
    .container {
      margin-left: calc(var(--sidebar-width) + 40px);
      padding: 40px;
      transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sidebar.collapsed + .container { margin-left: calc(var(--sidebar-collapsed-width) + 40px); }

    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 42px; margin-bottom: 10px; }

    .search-container { max-width: 500px; margin: 0 auto 50px; position: relative; }
    .search-input {
      width: 100%; padding: 15px 50px;
      background: var(--card-bg); backdrop-filter: blur(5px);
      border: 2px solid var(--card-border); border-radius: 30px;
      color: var(--text-main); outline: none;
    }
    .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); opacity: 0.7; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }

    .card {
      background: var(--card-bg); backdrop-filter: blur(15px);
      border: 2.5px solid var(--card-border); border-radius: 28px;
      padding: 40px 25px; transition: transform 0.3s;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.2); }

    .btn {
      width: 100%; padding: 14px; background: var(--accent); color: white;
      text-decoration: none; border-radius: 16px; font-weight: 800;
      border: 3px solid #000; box-shadow: 0 5px 0px #000;
      display: flex; align-items: center; justify-content: center;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 0px 0px #000; }

    .theme-toggle {
      position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px;
      background: var(--card-bg); backdrop-filter: blur(10px);
      border-radius: 50%; border: 2.5px solid var(--card-border);
      cursor: pointer; font-size: 24px;
    }

    @media (max-width: 768px) {
        .sidebar { left: -300px; }
        .container { margin-left: 0 !important; }
    }
  </style>
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <button class="toggle-sidebar" id="toggleSidebarBtn">❮</button>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-text">Dashboard</span></a>
      <a href="#" class="nav-item"><span class="nav-icon">📅</span><span class="nav-text">Lịch dạy</span></a>
      <a href="#" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Báo cáo</span></a>
      <a href="#" class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-text">Cài đặt</span></a>
    </nav>
  </aside>

  <div class="container">
    <div class="header">
      <h1>AO Dashboard Q10</h1>
      <p id="greeting">Đang tải...</p>
    </div>

    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input type="search" class="search-input" id="quickSearch" placeholder="Tìm kiếm file nhanh...">
    </div>

    <div class="grid">
      <div class="card">
        <div style="font-size: 55px; margin-bottom: 20px;">📘</div>
        <h3>Học Cụ & In Ấn</h3>
        <p style="margin-bottom: 30px; opacity: 0.8;">Quản lý vật tư giảng dạy và in ấn.</p>
        <a class="btn" href="#">Mở file</a>
      </div>
      <div class="card">
        <div style="font-size: 55px; margin-bottom: 20px;">🧾</div>
        <h3>Hóa Đơn VAT</h3>
        <p style="margin-bottom: 30px; opacity: 0.8;">Theo dõi luồng hóa đơn tài chính.</p>
        <a class="btn" href="#">Mở file</a>
      </div>
      <div class="card">
        <div style="font-size: 55px; margin-bottom: 20px;">📚</div>
        <h3>Kho Sách</h3>
        <p style="margin-bottom: 30px; opacity: 0.8;">Kiểm kê tồn kho sách giáo khoa.</p>
        <a class="btn" href="#">Mở file</a>
      </div>
    </div>
  </div>

  <button class="theme-toggle" id="themeToggle">🤪</button>

  <script>
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggleSidebarBtn');
    const themeBtn = document.getElementById('themeToggle');

    // Sidebar Toggle
    toggleBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // Theme Toggle
    themeBtn.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      themeBtn.innerText = document.body.classList.contains('light-mode') ? "😎" : "🤪";
    });

    // Lời chào
    function updateGreeting() {
      const hour = new Date().getHours();
      let text = "Chúc bạn một ngày làm việc vui vẻ! ✨";
      if (hour < 12) text = "Chào buổi sáng! Chúc bạn ngày mới năng suất ☀️";
      else if (hour < 18) text = "Chào buổi chiều! Cố gắng hoàn thành sớm để về nhé 🚀";
      document.getElementById('greeting').innerText = text;
    }

    // Tìm kiếm nhanh
    document.getElementById('quickSearch').addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.card').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(term) ? "flex" : "none";
      });
    });

    updateGreeting();
  </script>
</body>
</html>
