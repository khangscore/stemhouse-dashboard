<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AO Dashboard Q10 | Custom Edition</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='black'/%3E%3Ccircle cx='50' cy='50' r='35' fill='white'/%3E%3C/svg%3E">

  <style>
    :root {
      --bg-color: #0a0515;
      --card-bg: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.2);
      --text-main: #ffffff;
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --liam-blue: #3b82f6;
      --sidebar-width: 260px;
      --sidebar-collapsed-width: 80px;
      --shadow-accent: 0 0 18px rgba(34, 197, 94, 0.35);
      --sidebar-border-width: 8px;
    }

    body.light-mode {
      --bg-color: #f8fafc;
      --card-bg: rgba(0, 0, 0, 0.05);
      --card-border: rgba(0, 0, 0, 0.1);
      --text-main: #1e293b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "Noto Color Emoji", sans-serif;
    }

    *,
    *::before,
    *::after {
      will-change: auto;
    }

    body {
      background: var(--bg-color);
      background-image: radial-gradient(circle at 50% -20%, #6d28d9, #3c1f5c, #0a0515),
                        radial-gradient(circle at 80% 80%, #5b21b6, transparent);
      background-attachment: fixed;
      background-size: 100% 100%, 200% 200%;
      animation: gradientShift 15s ease infinite;
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    @keyframes gradientShift {
      0%, 100% {
        background-position: 0% 0%, 0% 0%;
      }
      50% {
        background-position: 100% 100%, 100% 100%;
      }
    }

    body.light-mode {
      background-image: radial-gradient(circle at 50% -20%, #e2e8f0, #f8fafc);
      animation: none;
    }

    .card:hover,
    .btn:hover,
    .btn-save-fixed:hover,
    .theme-switch:hover,
    .nav-item:not(.active):hover {
      box-shadow:
        0 0 0 1px var(--accent),
        0 10px 30px rgba(0,0,0,0.18),
        var(--shadow-accent) !important;
      border-color: var(--accent) !important;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.01);
      background: rgba(255,255,255,0.02);
    }

    .sidebar-wrapper {
      position: fixed;
      top: 20px;
      left: 10px;
      bottom: 20px;
      width: calc(var(--sidebar-collapsed-width) + 2 * var(--sidebar-border-width));
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-wrapper:hover {
      width: calc(var(--sidebar-width) + 2 * var(--sidebar-border-width));
    }

    .sidebar-border {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      border: var(--sidebar-border-width) solid transparent;
      background: linear-gradient(var(--bg-color), var(--bg-color)) padding-box,
                  linear-gradient(135deg, var(--accent), #8b5cf6, var(--accent)) border-box;
      pointer-events: none;
      transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1);
      opacity: 0.6;
    }

    .sidebar-wrapper:hover .sidebar-border {
      opacity: 1;
      border-width: var(--sidebar-border-width);
    }

    .sidebar {
      position: absolute;
      inset: 0;
      width: calc(100% - 2 * var(--sidebar-border-width));
      height: calc(100% - 2 * var(--sidebar-border-width));
      left: var(--sidebar-border-width);
      top: var(--sidebar-border-width);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      z-index: 2001;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-header {
      padding: 58px 12px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: #fff;
      object-fit: cover;
      transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .sidebar-wrapper:hover .sidebar-avatar {
      width: 60px;
      height: 60px;
    }

    .sidebar-username {
      margin-top: 12px;
      font-weight: bold;
      font-size: 0.9rem;
      color: var(--accent);
      opacity: 0;
      white-space: nowrap;
      visibility: hidden;
      transition: all 0.38s cubic-bezier(0.22, 1, 0.36, 1);
      transform: translateX(-10px);
      filter: blur(4px);
    }

    .sidebar-wrapper:hover .sidebar-username {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
      filter: blur(0);
    }

    .nav-content {
      flex: 1;
      margin-top: 18px;
      width: 100%;
      display: flex;
      flex-direction: column;
      padding: 0 10px 14px;
      gap: 8px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .nav-item {
      min-height: 56px;
      height: 56px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 16px;
      cursor: pointer;
      color: inherit;
      flex-shrink: 0;
      gap: 12px;
      transition:
        background 0.22s ease,
        color 0.22s ease,
        box-shadow 0.25s ease,
        transform 0.18s ease,
        border-color 0.22s ease;
    }

    .nav-item:not(.active):hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3),
                  0 0 0 1px var(--accent),
                  var(--shadow-accent);
    }

    .nav-item > span:first-child {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 26px;
      font-size: 1.15rem;
      line-height: 1;
      filter: saturate(1.15) contrast(1.08);
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000,
        -2px 0 0 #000,
        2px 0 0 #000,
        0 -2px 0 #000,
        0 2px 0 #000;
    }

    .nav-icon {
      width: 28px;
      min-width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      line-height: 1;
      flex-shrink: 0;
      transform: translateX(1px);
    }

    .sidebar-wrapper:not(:hover) .nav-item {
      justify-content: center;
      padding: 0;
    }

    .sidebar-wrapper:not(:hover) .nav-icon {
      margin-left: 15px;
    }

    .nav-item.active {
      text-shadow: 0 1px 1px rgba(255,255,255,0.18);
    }

    .sidebar-wrapper:hover .nav-item {
      justify-content: flex-start;
      padding-left: 18px;
    }

    .nav-item.active {
      background: var(--accent);
      color: #000;
      font-weight: bold;
      box-shadow: var(--shadow-accent);
    }

    .nav-text {
      flex: 1;
      opacity: 0;
      visibility: hidden;
      white-space: nowrap;
      overflow: hidden;
      transform: translateX(-10px);
      filter: blur(4px);
      transition:
        opacity 0.22s ease,
        transform 0.28s ease,
        filter 0.28s ease;
    }

    .sidebar-wrapper:hover .nav-text {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
      filter: blur(0);
    }

    .sidebar-footer {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      border-top: 1px solid var(--card-border);
    }

    .btn-logout {
      width: 100%;
      padding: 12px;
      background: rgba(255, 59, 48, 0.2);
      color: #ff3b30;
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.22s ease;
    }

    .btn-logout:hover {
      background: rgba(255, 59, 48, 0.3);
      border-color: rgba(255, 59, 48, 0.5);
    }

    .btn-logout .icon {
      font-size: 1.2rem;
    }

    .btn-logout span {
      opacity: 0;
      visibility: hidden;
      white-space: nowrap;
      transform: translateX(-10px);
      filter: blur(4px);
      transition: all 0.22s ease;
    }

    .sidebar-wrapper:hover .btn-logout span {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
      filter: blur(0);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px 100px 120px;
      position: relative;
    }

    .header-group {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-group h1 {
      font-size: 4rem;
      letter-spacing: -3px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(10px);
      position: relative;
      min-height: 200px;
      justify-content: center;
      transition:
        transform 0.28s cubic-bezier(0.22, 1, 0.36, 1),
        box-shadow 0.28s ease,
        border-color 0.25s ease,
        background 0.25s ease;
    }

    .shortcut-card.dragging {
      opacity: 0.5;
      transform: scale(0.98);
    }

    .add-card {
      cursor: pointer;
      border-style: dashed;
      border-width: 2px;
    }

    .add-card .plus-icon {
      font-size: 80px;
      color: var(--accent);
      line-height: 1;
      font-weight: 300;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.08);
      color: var(--text-main);
      text-decoration: none;
      border-radius: 14px;
      font-weight: bold;
      margin-top: 15px;
      border: 1px solid var(--card-border);
      cursor: pointer;
    }

    .shortcut-card .btn {
      background: color-mix(in srgb, var(--accent) 88%, black 15%);
      color: #000;
      border: 2px solid #000;
      box-shadow: 0 4px 10px color-mix(in srgb, var(--accent) 35%, transparent);
    }

    .btn:hover {
      transform: scale(1.03);
    }

    .btn-delete {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 25px;
      height: 25px;
      background: rgba(255,0,0,0.2);
      color: #ff4747;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      border: none;
      z-index: 10;
    }

    .btn-edit {
      background: rgba(34,197,94,0.18);
      color: #22c55e;
    }

    .btn-edit:hover {
      background: rgba(34,197,94,0.28);
      color: #4ade80;
    }

    .card:hover .btn-delete {
      opacity: 1;
    }

    .page-content {
      display: none;
    }

    .page-content.active-page {
      display: block;
    }

    .btn-save-fixed {
      display: none;
    }

    .btn-save-bottom {
      width: 100%;
      max-width: 450px;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 70%, #fff));
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25), 0 2px 0 rgba(255,255,255,0.1) inset;
      transition: all 0.15s;
      position: relative;
      top: 0;
    }

    .btn-save-bottom:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.3);
    }

    .btn-save-bottom:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      top: 1px;
    }

    .avatar-preview-box {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      margin-bottom: 10px;
      background: #fff;
      object-fit: cover;
    }

    .color-palette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      width: 100%;
      margin-top: 8px;
    }

    .color-dot {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
    }

    .color-dot:hover {
      transform: scale(1.12);
      box-shadow: 0 0 14px var(--dot-color);
      border-color: var(--dot-color);
      background: var(--dot-color) !important;
    }

    .theme-switch {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 3000;
      font-size: 1.6rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000,
        -2px 0 0 #000,
        2px 0 0 #000,
        0 -2px 0 #000,
        0 2px 0 #000;
      transition: all 0.22s ease;
    }

    .bg-customizer {
      position: fixed;
      bottom: 100px;
      right: 30px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 3000;
      font-size: 1.6rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      text-shadow:
        -1px -1px 0 #000,
        1px -1px 0 #000,
        -1px 1px 0 #000,
        1px 1px 0 #000,
        -2px 0 0 #000,
        2px 0 0 #000,
        0 -2px 0 #000,
        0 2px 0 #000;
      transition: all 0.22s ease;
    }

    .bg-customizer:hover,
    .theme-switch:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    }

    #bgInput {
      display: none;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10002;
      padding: 20px;
    }

    .modal-box {
      background: linear-gradient(180deg, #1f232c, #171a22);
      width: 100%;
      max-width: 500px;
      border-radius: 24px;
      padding: 24px;
      color: #e8eaed;
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .modal-title {
      text-align: left;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.82rem;
      color: #9aa0a6;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      background: #2a2f3a;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 12px 14px;
      color: #e8eaed;
      border-radius: 12px;
      outline: none;
      font-size: 0.95rem;
    }

    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      background: #2a2f3a;
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 20px;
      max-height: 280px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #000 transparent;
    }

    .emoji-grid::-webkit-scrollbar {
      width: 10px;
    }

    .emoji-grid::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 999px;
    }

    .emoji-grid::-webkit-scrollbar-thumb {
      background: #000;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .emoji-grid::-webkit-scrollbar-thumb:hover {
      background: #111;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    .emoji-item {
      font-size: 1.6rem;
      cursor: pointer;
      padding: 8px;
      border-radius: 12px;
      border: 2px solid transparent;
    }

    .emoji-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .emoji-item.selected {
      border-color: var(--accent);
      background: rgba(255,255,255,0.06);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 10px;
    }

    .modal-actions button {
      padding: 11px 22px;
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    .btn-confirm {
      background: #ff4747;
      color: #fff;
    }

    .btn-cancel {
      background: #3c4043;
      color: #fff;
    }

    .home-clock {
      font-size: 3.2rem;
      font-weight: 800;
      text-align: center;
      letter-spacing: -2px;
    }

    .home-date {
      text-align: center;
      font-size: 1rem;
      opacity: 0.8;
      margin-top: 8px;
      margin-bottom: 24px;
    }

    .calendar-box {
      max-width: 760px;
      margin: 0 auto 25px;
      padding: 24px;
    }

    .calendar-head {
      text-align: center;
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      text-align: center;
    }

    .calendar-cell {
      padding: 12px 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      font-size: 0.95rem;
    }

    .calendar-cell.today {
      background: var(--accent);
      color: #000;
      font-weight: bold;
    }

    .calendar-layout {
      max-width: 100%;
      width: 100%;
      margin: 0 auto;
      min-height: 600px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: stretch;
      text-align: left;
    }

    .calendar-left,
    .calendar-right {
      width: 100%;
    }

    .calendar-left {
      display: flex;
      flex-direction: column;
    }

    .calendar-top-shell {
      background: var(--accent);
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .calendar-toolbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 0 26px color-mix(in srgb, var(--accent) 35%, transparent),
        0 0 42px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .calendar-nav-btn {
      width: 46px;
      height: 46px;
      border: 2px solid #000;
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--accent-dark);
      color: #101010;
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .calendar-nav-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      box-shadow: var(--shadow-accent);
    }

    .calendar-cell {
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.18s ease;
      padding: 8px;
      border: 1px solid transparent;
      gap: 4px;
    }

    .calendar-cell .lunar {
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .calendar-cell .holiday {
      font-size: 0.75rem;
      color: #ff6b6b;
      font-weight: bold;
    }

    .calendar-cell .note-mini {
      font-size: 0.65rem;
      opacity: 0.6;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-cell:hover {
      transform: translateY(-2px);
      border: 1px solid var(--accent);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.2);
    }

    .calendar-cell.weekday {
      min-height: 44px;
      font-weight: 800;
      background: rgba(255,255,255,0.22);
      border: 1px solid rgba(255,255,255,0.22);
      color: #101010;
      text-shadow: none;
      cursor: default;
    }

    .calendar-cell.empty {
      background: transparent;
      cursor: default;
    }

    .calendar-cell.empty:hover {
      transform: none;
      border: none;
    }

  <script type="module">

  <script>
    // ========== VARIABLES ==========
    const EMOJI_LIST = ['😀', '😂', '😍', '🤩', '😎', '🤓', '😴', '😴', '🤪', '🙄', '😒', '😠', '😡', '🤬', '😱', '😨', '😰', '😢', '😭', '😤', '😔', '😞', '😖', '😚', '😘', '🤗', '😇', '🤔', '😏', '😌', '😗'];
    const COLORS = ['#22c55e', '#3b82f6', '#f43f5e', '#f59e0b', '#8b5cf6', '#10b981', '#ec4899', '#6366f1'];
    let currentUser = null;
    let currentEmoji = '😀';
    let customBg = null;

    // ========== CLOCK UPDATE ==========
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clockDisplay').textContent = `${hours}:${minutes}`;

      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const formattedDate = now.toLocaleDateString('vi-VN', options);
      document.getElementById('dateDisplay').textContent = formattedDate;
    }

    setInterval(updateClock, 1000);
    updateClock();

    // ========== CALENDAR FUNCTIONS ==========
    let currentMonth = new Date().getMonth();
    let currentYear = new Date().getFullYear();

    const lunarDates = {
      // Thêm dữ liệu âm lịch (ví dụ cơ bản)
      '2026-5-15': 'AL 16/4'
    };

    const holidays = {
      '2026-1-1': 'Năm mới',
      '2026-2-17': 'Tết Nguyên Đán',
      '2026-4-18': 'Giỗ Tổ Hùng Vương',
      '2026-4-30': 'Giải phóng miền Nam',
      '2026-5-1': 'Quốc tế Lao động',
      '2026-9-2': 'Quốc khánh'
    };

    function renderCalendar() {
      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const prevLastDay = new Date(currentYear, currentMonth, 0);

      const calendarGrid = document.getElementById('calendarGrid');
      const monthYearDisplay = document.getElementById('monthYearDisplay');
      const calendarWeekdays = document.getElementById('calendarWeekdays');

      calendarGrid.innerHTML = '';
      calendarWeekdays.innerHTML = '';

      monthYearDisplay.textContent = `Tháng ${currentMonth + 1} Năm ${currentYear}`;

      const weekdays = ['T2', 'T3', 'T4', 'T5', 'T6', 'T7', 'CN'];
      weekdays.forEach(day => {
        const weekdayCell = document.createElement('div');
        weekdayCell.className = 'calendar-cell weekday';
        weekdayCell.textContent = day;
        calendarWeekdays.appendChild(weekdayCell);
      });

      for (let i = firstDay.getDay() - 1; i > 0; i--) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'calendar-cell empty';
        calendarGrid.appendChild(emptyCell);
      }

      for (let date = 1; date <= lastDay.getDate(); date++) {
        const cell = document.createElement('div');
        cell.className = 'calendar-cell';

        const dateStr = `2026-${String(currentMonth + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
        const today = new Date();
        const isToday = date === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();

        if (isToday) cell.classList.add('today');

        let content = `<div>${date}</div>`;

        if (lunarDates[dateStr]) {
          content += `<div class="lunar">${lunarDates[dateStr]}</div>`;
        }

        if (holidays[dateStr]) {
          content += `<div class="holiday">${holidays[dateStr]}</div>`;
        }

        cell.innerHTML = content;
        cell.style.cursor = 'pointer';
        cell.onclick = () => selectDate(dateStr);

        calendarGrid.appendChild(cell);
      }

      for (let date = 1; date <= 6; date++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'calendar-cell empty';
        calendarGrid.appendChild(emptyCell);
      }
    }

    function prevMonth() {
      currentMonth--;
      if (currentMonth < 0) {
        currentMonth = 11;
        currentYear--;
      }
      renderCalendar();
    }

    function nextMonth() {
      currentMonth++;
      if (currentMonth > 11) {
        currentMonth = 0;
        currentYear++;
      }
      renderCalendar();
    }

    function selectDate(dateStr) {
      console.log('Selected date:', dateStr);
    }

    // ========== EMOJI SETUP ==========
    function setupEmojiGrid() {
      const emojiGrid = document.getElementById('emojiGrid');
      EMOJI_LIST.forEach(emoji => {
        const item = document.createElement('div');
        item.className = 'emoji-item';
        item.textContent = emoji;
        item.onclick = () => selectEmoji(emoji);
        if (emoji === currentEmoji) item.classList.add('selected');
        emojiGrid.appendChild(item);
      });
    }

    function selectEmoji(emoji) {
      currentEmoji = emoji;
      document.querySelectorAll('.emoji-item').forEach(el => el.classList.remove('selected'));
      event.target.classList.add('selected');
    }

    // ========== COLOR SETUP ==========
    function setupColorPalette() {
      const colorPalette = document.getElementById('colorPalette');
      COLORS.forEach(color => {
        const dot = document.createElement('div');
        dot.className = 'color-dot';
        dot.style.setProperty('--dot-color', color);
        dot.style.backgroundColor = color;
        dot.onclick = () => changeThemeColor(color);
        colorPalette.appendChild(dot);
      });
    }

    function changeThemeColor(color) {
      document.documentElement.style.setProperty('--accent', color);
      const darkColor = adjustBrightness(color, -40);
      document.documentElement.style.setProperty('--accent-dark', darkColor);
      document.documentElement.style.setProperty('--shadow-accent', `0 0 18px ${color}40`);
      localStorage.setItem('themeColor', color);
    }

    function adjustBrightness(color, percent) {
      const num = parseInt(color.replace("#",""), 16);
      const amt = Math.round(2.55 * percent);
      const R = (num >> 16) + amt;
      const G = (num >> 8 & 0x00FF) + amt;
      const B = (num & 0x0000FF) + amt;
      return "#" + (0x1000000 + (R<255?R<1?0:R:255)*0x10000 +
        (G<255?G<1?0:G:255)*0x100 + (B<255?B<1?0:B:255))
        .toString(16).slice(1);
    }

    // ========== AVATAR UPLOAD ==========
    document.getElementById('avatarInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('avatarPreview').src = ev.target.result;
          document.getElementById('sidebarAvatar').src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('avatarDropZone').addEventListener('click', () => {
      document.getElementById('avatarInput').click();
    });

    // ========== BACKGROUND CUSTOMIZER ==========
    function triggerBgUpload() {
      document.getElementById('bgInput').click();
    }

    document.getElementById('bgInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          applyCustomBackground(ev.target.result);
        };
        reader.readAsDataURL(file);
      }
    });

    function applyCustomBackground(imgData) {
      customBg = imgData;
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 100;
        canvas.height = 100;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 100, 100);
        const imageData = ctx.getImageData(0, 0, 100, 100).data;
        const dominantColor = getDominantColor(imageData);
        document.body.style.backgroundImage = `url(${imgData})`;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
        changeThemeColor(dominantColor);
      };
      img.src = imgData;
    }

    function getDominantColor(pixels) {
      let r = 0, g = 0, b = 0;
      for (let i = 0; i < pixels.length; i += 4) {
        r += pixels[i];
        g += pixels[i + 1];
        b += pixels[i + 2];
      }
      const length = pixels.length / 4;
      r = Math.round(r / length);
      g = Math.round(g / length);
      b = Math.round(b / length);
      return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
    }

    // ========== PAGE NAVIGATION ==========
    function goToPage(page) {
      document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active-page'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(page + 'Page').classList.add('active-page');
      event.target.closest('.nav-item').classList.add('active');
    }

    // ========== THEME TOGGLE ==========
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }

    // ========== LOGOUT ==========
    function showLogoutConfirm() {
      document.getElementById('logoutModal').style.display = 'flex';
    }

    function cancelLogout() {
      document.getElementById('logoutModal').style.display = 'none';
    }

    function confirmLogout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    // ========== SETTINGS SAVE ==========
    function saveSettings() {
      const username = document.getElementById('usernameInput').value;
      const avatar = document.getElementById('avatarPreview').src;

      localStorage.setItem('username', username);
      localStorage.setItem('avatar', avatar);
      localStorage.setItem('emoji', currentEmoji);

      alert('✅ Cài đặt đã được lưu!');
    }

    // ========== EXCEL FUNCTIONS ==========
    function addExcelRow() {
      const table = document.getElementById('excelTable');
      const cols = table.rows[0].cells.length;
      const newRow = table.insertRow();
      for (let i = 0; i < cols; i++) {
        newRow.insertCell();
      }
    }

    function addExcelCol() {
      const table = document.getElementById('excelTable');
      for (let i = 0; i < table.rows.length; i++) {
        table.rows[i].insertCell();
      }
    }

    // ========== EXCEL CELL FOCUS ==========
    document.addEventListener('click', function(e) {
      if (e.target.tagName === 'TD') {
        e.target.focus();
      }
    });

    // ========== DATA MANAGEMENT ==========
    function exportData() {
      const data = {
        username: localStorage.getItem('username'),
        avatar: localStorage.getItem('avatar'),
        emoji: localStorage.getItem('emoji'),
        theme: localStorage.getItem('theme'),
        themeColor: localStorage.getItem('themeColor')
      };
      const json = JSON.stringify(data, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dashboard-data.json';
      a.click();
    }

    function importData() {
      document.getElementById('importInput').click();
    }

    document.getElementById('importInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            Object.keys(data).forEach(key => {
              if (key === 'themeColor') changeThemeColor(data[key]);
              else localStorage.setItem(key, data[key]);
            });
            location.reload();
          } catch (err) {
            alert('❌ Lỗi: File không hợp lệ');
          }
        };
        reader.readAsText(file);
      }
    });

    function clearData() {
      if (confirm('Bạn chắc chứ? Dữ liệu sẽ bị xóa vĩnh viễn! 🗑️')) {
        localStorage.clear();
        location.reload();
      }
    }

    function saveShortcuts() {
      alert('✅ Tắt nhanh đã được lưu!');
    }

    // ========== INITIALIZATION ==========
    function init() {
      setupEmojiGrid();
      setupColorPalette();
      renderCalendar();

      const savedUsername = localStorage.getItem('username') || 'Người dùng';
      const savedAvatar = localStorage.getItem('avatar') || 'https://via.placeholder.com/100';
      const savedEmoji = localStorage.getItem('emoji') || '😀';
      const savedTheme = localStorage.getItem('theme');
      const savedColor = localStorage.getItem('themeColor');

      document.getElementById('usernameInput').value = savedUsername;
      document.getElementById('sidebarUsername').textContent = savedUsername;
      document.getElementById('avatarPreview').src = savedAvatar;
      document.getElementById('sidebarAvatar').src = savedAvatar;
      currentEmoji = savedEmoji;

      if (savedTheme === 'light') document.body.classList.add('light-mode');
      if (savedColor) changeThemeColor(savedColor);

      console.log('✅ Dashboard initialized!');
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
